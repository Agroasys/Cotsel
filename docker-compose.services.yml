services:
  postgres:
    image: postgres:16-alpine
    profiles: ['local-dev', 'staging-e2e', 'staging-e2e-real', 'infra']
    restart: unless-stopped
    environment:
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${POSTGRES_DB}'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-init:
    image: postgres:16-alpine
    profiles: ['local-dev', 'staging-e2e', 'staging-e2e-real']
    restart: 'no'
    environment:
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${POSTGRES_DB}'
      AUTH_DB_NAME: '${AUTH_DB_NAME}'
      RICARDIAN_DB_NAME: '${RICARDIAN_DB_NAME}'
      TREASURY_DB_NAME: '${TREASURY_DB_NAME}'
      RECONCILIATION_DB_NAME: '${RECONCILIATION_DB_NAME}'
      ORACLE_DB_NAME: '${ORACLE_DB_NAME}'
      INDEXER_DB_NAME: '${INDEXER_DB_NAME}'
      GATEWAY_DB_NAME: '${GATEWAY_DB_NAME}'
      AUTH_DB_RUNTIME_USER: '${AUTH_DB_RUNTIME_USER}'
      AUTH_DB_RUNTIME_PASSWORD: '${AUTH_DB_RUNTIME_PASSWORD}'
      AUTH_DB_MIGRATION_USER: '${AUTH_DB_MIGRATION_USER}'
      AUTH_DB_MIGRATION_PASSWORD: '${AUTH_DB_MIGRATION_PASSWORD}'
      RICARDIAN_DB_RUNTIME_USER: '${RICARDIAN_DB_RUNTIME_USER}'
      RICARDIAN_DB_RUNTIME_PASSWORD: '${RICARDIAN_DB_RUNTIME_PASSWORD}'
      RICARDIAN_DB_MIGRATION_USER: '${RICARDIAN_DB_MIGRATION_USER}'
      RICARDIAN_DB_MIGRATION_PASSWORD: '${RICARDIAN_DB_MIGRATION_PASSWORD}'
      TREASURY_DB_RUNTIME_USER: '${TREASURY_DB_RUNTIME_USER}'
      TREASURY_DB_RUNTIME_PASSWORD: '${TREASURY_DB_RUNTIME_PASSWORD}'
      TREASURY_DB_MIGRATION_USER: '${TREASURY_DB_MIGRATION_USER}'
      TREASURY_DB_MIGRATION_PASSWORD: '${TREASURY_DB_MIGRATION_PASSWORD}'
      RECONCILIATION_DB_RUNTIME_USER: '${RECONCILIATION_DB_RUNTIME_USER}'
      RECONCILIATION_DB_RUNTIME_PASSWORD: '${RECONCILIATION_DB_RUNTIME_PASSWORD}'
      RECONCILIATION_DB_MIGRATION_USER: '${RECONCILIATION_DB_MIGRATION_USER}'
      RECONCILIATION_DB_MIGRATION_PASSWORD: '${RECONCILIATION_DB_MIGRATION_PASSWORD}'
      ORACLE_DB_RUNTIME_USER: '${ORACLE_DB_RUNTIME_USER}'
      ORACLE_DB_RUNTIME_PASSWORD: '${ORACLE_DB_RUNTIME_PASSWORD}'
      ORACLE_DB_MIGRATION_USER: '${ORACLE_DB_MIGRATION_USER}'
      ORACLE_DB_MIGRATION_PASSWORD: '${ORACLE_DB_MIGRATION_PASSWORD}'
      GATEWAY_DB_RUNTIME_USER: '${GATEWAY_DB_RUNTIME_USER}'
      GATEWAY_DB_RUNTIME_PASSWORD: '${GATEWAY_DB_RUNTIME_PASSWORD}'
      GATEWAY_DB_MIGRATION_USER: '${GATEWAY_DB_MIGRATION_USER}'
      GATEWAY_DB_MIGRATION_PASSWORD: '${GATEWAY_DB_MIGRATION_PASSWORD}'
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ceu
      - |
        export PGPASSWORD="$${POSTGRES_PASSWORD}"
        ensure_db() {
          db="$$1"
          echo "ensuring database: $$db"
          exists="$$(psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -Atqc "SELECT 1 FROM pg_database WHERE datname = '$$db'")"
          echo "exists query for $$db: $${exists:-<empty>}"
          if [ "$${exists}" != "1" ]; then
            psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -c "CREATE DATABASE \"$$db\";"
          fi
        }
        ensure_role() {
          role_name="$$1"
          role_password="$$2"
          escaped_role_password="$$(printf '%s' "$$role_password" | sed "s/'/''/g")"
          if [ -z "$${role_name}" ] || [ -z "$${role_password}" ]; then
            echo "role name/password must both be set" >&2
            exit 1
          fi
          exists="$$(psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -Atqc "SELECT 1 FROM pg_roles WHERE rolname = '$$role_name'")"
          if [ "$${exists}" = "1" ]; then
            psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -c "ALTER ROLE \"$$role_name\" WITH LOGIN PASSWORD '$$escaped_role_password' NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOREPLICATION;"
          else
            psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -c "CREATE ROLE \"$$role_name\" WITH LOGIN PASSWORD '$$escaped_role_password' NOSUPERUSER NOCREATEDB NOCREATEROLE NOINHERIT NOREPLICATION;"
          fi
        }
        configure_db_access() {
          db="$$1"
          runtime_user="$$2"
          migration_user="$$3"
          psql -h postgres -U "$${POSTGRES_USER}" -d "$$db" -c "REVOKE ALL ON DATABASE \"$$db\" FROM PUBLIC;"
          psql -h postgres -U "$${POSTGRES_USER}" -d "$$db" -c "GRANT CONNECT ON DATABASE \"$$db\" TO \"$$runtime_user\";"
          psql -h postgres -U "$${POSTGRES_USER}" -d "$$db" -c "GRANT CONNECT ON DATABASE \"$$db\" TO \"$$migration_user\";"
          psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -c "GRANT CREATE ON DATABASE \"$$db\" TO \"$$migration_user\";"
          psql -h postgres -U "$${POSTGRES_USER}" -d "$$db" -c "REVOKE CREATE ON SCHEMA public FROM PUBLIC;"
          psql -h postgres -U "$${POSTGRES_USER}" -d "$$db" -c "GRANT USAGE ON SCHEMA public TO \"$$runtime_user\";"
          psql -h postgres -U "$${POSTGRES_USER}" -d "$$db" -c "GRANT USAGE, CREATE ON SCHEMA public TO \"$$migration_user\";"
        }
        ensure_db "$${AUTH_DB_NAME}"
        ensure_db "$${RICARDIAN_DB_NAME}"
        ensure_db "$${TREASURY_DB_NAME}"
        ensure_db "$${RECONCILIATION_DB_NAME}"
        ensure_db "$${ORACLE_DB_NAME}"
        ensure_db "$${INDEXER_DB_NAME}"
        ensure_db "$${GATEWAY_DB_NAME}"
        ensure_role "$${AUTH_DB_RUNTIME_USER}" "$${AUTH_DB_RUNTIME_PASSWORD}"
        ensure_role "$${AUTH_DB_MIGRATION_USER}" "$${AUTH_DB_MIGRATION_PASSWORD}"
        ensure_role "$${RICARDIAN_DB_RUNTIME_USER}" "$${RICARDIAN_DB_RUNTIME_PASSWORD}"
        ensure_role "$${RICARDIAN_DB_MIGRATION_USER}" "$${RICARDIAN_DB_MIGRATION_PASSWORD}"
        ensure_role "$${TREASURY_DB_RUNTIME_USER}" "$${TREASURY_DB_RUNTIME_PASSWORD}"
        ensure_role "$${TREASURY_DB_MIGRATION_USER}" "$${TREASURY_DB_MIGRATION_PASSWORD}"
        ensure_role "$${RECONCILIATION_DB_RUNTIME_USER}" "$${RECONCILIATION_DB_RUNTIME_PASSWORD}"
        ensure_role "$${RECONCILIATION_DB_MIGRATION_USER}" "$${RECONCILIATION_DB_MIGRATION_PASSWORD}"
        ensure_role "$${ORACLE_DB_RUNTIME_USER}" "$${ORACLE_DB_RUNTIME_PASSWORD}"
        ensure_role "$${ORACLE_DB_MIGRATION_USER}" "$${ORACLE_DB_MIGRATION_PASSWORD}"
        ensure_role "$${GATEWAY_DB_RUNTIME_USER}" "$${GATEWAY_DB_RUNTIME_PASSWORD}"
        ensure_role "$${GATEWAY_DB_MIGRATION_USER}" "$${GATEWAY_DB_MIGRATION_PASSWORD}"
        configure_db_access "$${AUTH_DB_NAME}" "$${AUTH_DB_RUNTIME_USER}" "$${AUTH_DB_MIGRATION_USER}"
        configure_db_access "$${RICARDIAN_DB_NAME}" "$${RICARDIAN_DB_RUNTIME_USER}" "$${RICARDIAN_DB_MIGRATION_USER}"
        configure_db_access "$${TREASURY_DB_NAME}" "$${TREASURY_DB_RUNTIME_USER}" "$${TREASURY_DB_MIGRATION_USER}"
        configure_db_access "$${RECONCILIATION_DB_NAME}" "$${RECONCILIATION_DB_RUNTIME_USER}" "$${RECONCILIATION_DB_MIGRATION_USER}"
        configure_db_access "$${ORACLE_DB_NAME}" "$${ORACLE_DB_RUNTIME_USER}" "$${ORACLE_DB_MIGRATION_USER}"
        configure_db_access "$${GATEWAY_DB_NAME}" "$${GATEWAY_DB_RUNTIME_USER}" "$${GATEWAY_DB_MIGRATION_USER}"

  redis:
    image: redis:7-alpine
    profiles: ['local-dev', 'staging-e2e', 'staging-e2e-real', 'infra']
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    ports:
      - '${REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  indexer:
    image: node:20-alpine
    profiles: ['local-dev']
    restart: unless-stopped
    environment:
      LOCAL_DEV_INDEXER_FIXTURE_MODE: '${LOCAL_DEV_INDEXER_FIXTURE_MODE:-empty}'
      LOCAL_DEV_INDEXER_FIXTURE_PATH: '/app/scripts/fixtures/local-dev-dashboard-parity-trade.json'
      LOCAL_DEV_INDEXER_PORT: '4350'
    command:
      - node
      - /app/scripts/local-dev-indexer-responder.mjs
    volumes:
      - ./scripts/local-dev-indexer-responder.mjs:/app/scripts/local-dev-indexer-responder.mjs:ro
      - ./scripts/lib/local-dev-indexer-fixture.mjs:/app/scripts/lib/local-dev-indexer-fixture.mjs:ro
      - ./scripts/fixtures/local-dev-dashboard-parity-trade.json:/app/scripts/fixtures/local-dev-dashboard-parity-trade.json:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          fetch('http://127.0.0.1:4350/graphql', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: 'query { __typename }' }),
          })
            .then((response) => process.exit(response.ok ? 0 : 1))
            .catch(() => process.exit(1));
      interval: 10s
      timeout: 5s
      retries: 5

  indexer-migrate:
    profiles: ['staging-e2e', 'staging-e2e-real']
    build:
      context: .
      dockerfile: indexer/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: '${INDEXER_DB_NAME}'
      DB_USER: '${POSTGRES_USER}'
      DB_PASSWORD: '${POSTGRES_PASSWORD}'
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    command: ['npx', 'squid-typeorm-migration', 'apply']

  indexer-pipeline:
    profiles: ['staging-e2e', 'staging-e2e-real']
    restart: unless-stopped
    build:
      context: .
      dockerfile: indexer/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: '${INDEXER_DB_NAME}'
      DB_USER: '${POSTGRES_USER}'
      DB_PASSWORD: '${POSTGRES_PASSWORD}'
      GATEWAY_URL: '${INDEXER_GATEWAY_URL}'
      RPC_ENDPOINT: '${INDEXER_RPC_ENDPOINT}'
      START_BLOCK: '${INDEXER_START_BLOCK}'
      RATE_LIMIT: '${INDEXER_RATE_LIMIT}'
      RPC_CAPACITY: '${INDEXER_RPC_CAPACITY:-}'
      RPC_MAX_BATCH_CALL_SIZE: '${INDEXER_RPC_MAX_BATCH_CALL_SIZE:-}'
      RPC_REQUEST_TIMEOUT_MS: '${INDEXER_RPC_REQUEST_TIMEOUT_MS:-}'
      RPC_RETRY_ATTEMPTS: '${INDEXER_RPC_RETRY_ATTEMPTS:-}'
      RPC_HEAD_POLL_INTERVAL_MS: '${INDEXER_RPC_HEAD_POLL_INTERVAL_MS:-}'
      RPC_INGEST_DISABLED: '${INDEXER_RPC_INGEST_DISABLED:-false}'
      SUBSQUID_EVM_RPC_SPLIT_SIZE: '${INDEXER_RPC_BLOCK_SPLIT_SIZE:-10}'
      FINALITY_CONFIRMATION_BLOCKS: '${FINALITY_CONFIRMATION_BLOCKS}'
      CONTRACT_ADDRESS: '${INDEXER_CONTRACT_ADDRESS}'
      GRAPHQL_PORT: '${INDEXER_GRAPHQL_PORT}'
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      indexer-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'lib/main.js'"]
      interval: 15s
      timeout: 5s
      retries: 5

  indexer-graphql:
    profiles: ['staging-e2e', 'staging-e2e-real']
    build:
      context: .
      dockerfile: indexer/Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: '${INDEXER_DB_NAME}'
      DB_USER: '${POSTGRES_USER}'
      DB_PASSWORD: '${POSTGRES_PASSWORD}'
      GQL_PORT: '${INDEXER_GRAPHQL_PORT}'
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      indexer-migrate:
        condition: service_completed_successfully
    command: ['npx', 'squid-graphql-server']
    ports:
      - '${INDEXER_GRAPHQL_PORT:-4350}:${INDEXER_GRAPHQL_PORT:-4350}'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          const p = process.env.GQL_PORT || '4350';
          fetch('http://127.0.0.1:' + p + '/graphql', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: '{ __typename }' }),
          })
            .then((response) => process.exit(response.ok ? 0 : 1))
            .catch(() => process.exit(1));
      interval: 10s
      timeout: 5s
      retries: 8

  ricardian:
    profiles: ['local-dev', 'staging-e2e', 'staging-e2e-real']
    restart: unless-stopped
    build:
      context: .
      dockerfile: ricardian/Dockerfile
    environment:
      PORT: '${RICARDIAN_PORT}'
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: '${RICARDIAN_DB_NAME}'
      DB_USER: '${RICARDIAN_DB_RUNTIME_USER}'
      DB_PASSWORD: '${RICARDIAN_DB_RUNTIME_PASSWORD}'
      DB_MIGRATION_USER: '${RICARDIAN_DB_MIGRATION_USER}'
      DB_MIGRATION_PASSWORD: '${RICARDIAN_DB_MIGRATION_PASSWORD}'
      AUTH_ENABLED: '${RICARDIAN_AUTH_ENABLED}'
      API_KEYS_JSON: '${RICARDIAN_API_KEYS_JSON}'
      HMAC_SECRET: '${RICARDIAN_HMAC_SECRET:-}'
      AUTH_MAX_SKEW_SECONDS: '${RICARDIAN_AUTH_MAX_SKEW_SECONDS}'
      AUTH_NONCE_TTL_SECONDS: '${RICARDIAN_AUTH_NONCE_TTL_SECONDS}'
      NONCE_STORE: '${RICARDIAN_NONCE_STORE:-inmemory}'
      REDIS_URL: '${RICARDIAN_NONCE_REDIS_URL:-}'
      NONCE_TTL_SECONDS: '${RICARDIAN_NONCE_TTL_SECONDS:-${RICARDIAN_AUTH_NONCE_TTL_SECONDS}}'
      RATE_LIMIT_ENABLED: '${RICARDIAN_RATE_LIMIT_ENABLED}'
      RATE_LIMIT_REDIS_URL: '${RICARDIAN_RATE_LIMIT_REDIS_URL}'
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - '${RICARDIAN_PORT:-3100}:${RICARDIAN_PORT:-3100}'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          const p = process.env.PORT || '3100';
          fetch('http://127.0.0.1:' + p + '/api/ricardian/v1/health')
            .then((response) => process.exit(response.ok ? 0 : 1))
            .catch(() => process.exit(1));
      interval: 10s
      timeout: 5s
      retries: 8

  auth:
    profiles: ['local-dev', 'staging-e2e', 'staging-e2e-real']
    restart: unless-stopped
    build:
      context: .
      dockerfile: auth/Dockerfile
    environment:
      PORT: '${AUTH_PORT}'
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: '${AUTH_DB_NAME}'
      DB_USER: '${AUTH_DB_RUNTIME_USER}'
      DB_PASSWORD: '${AUTH_DB_RUNTIME_PASSWORD}'
      DB_MIGRATION_USER: '${AUTH_DB_MIGRATION_USER}'
      DB_MIGRATION_PASSWORD: '${AUTH_DB_MIGRATION_PASSWORD}'
      SESSION_TTL_SECONDS: '${AUTH_SESSION_TTL_SECONDS}'
      AUTH_CORS_ALLOWED_ORIGINS: '${AUTH_CORS_ALLOWED_ORIGINS}'
      AUTH_CORS_ALLOW_NO_ORIGIN: '${AUTH_CORS_ALLOW_NO_ORIGIN}'
      AUTH_RATE_LIMIT_ENABLED: '${AUTH_RATE_LIMIT_ENABLED}'
      AUTH_RATE_LIMIT_REDIS_URL: '${AUTH_RATE_LIMIT_REDIS_URL}'
      AUTH_RATE_LIMIT_FAIL_OPEN: '${AUTH_RATE_LIMIT_FAIL_OPEN:-false}'
      TRUSTED_SESSION_EXCHANGE_ENABLED: '${TRUSTED_SESSION_EXCHANGE_ENABLED}'
      TRUSTED_SESSION_EXCHANGE_API_KEYS_JSON: '${TRUSTED_SESSION_EXCHANGE_API_KEYS_JSON}'
      TRUSTED_SESSION_EXCHANGE_MAX_SKEW_SECONDS: '${TRUSTED_SESSION_EXCHANGE_MAX_SKEW_SECONDS}'
      TRUSTED_SESSION_EXCHANGE_NONCE_TTL_SECONDS: '${TRUSTED_SESSION_EXCHANGE_NONCE_TTL_SECONDS}'
      AUTH_ADMIN_CONTROL_ENABLED: '${AUTH_ADMIN_CONTROL_ENABLED:-false}'
      AUTH_ADMIN_CONTROL_API_KEYS_JSON: '${AUTH_ADMIN_CONTROL_API_KEYS_JSON:-}'
      AUTH_ADMIN_CONTROL_ALLOWED_API_KEY_IDS: '${AUTH_ADMIN_CONTROL_ALLOWED_API_KEY_IDS:-}'
      AUTH_ADMIN_CONTROL_MAX_SKEW_SECONDS: '${AUTH_ADMIN_CONTROL_MAX_SKEW_SECONDS:-300}'
      AUTH_ADMIN_CONTROL_NONCE_TTL_SECONDS: '${AUTH_ADMIN_CONTROL_NONCE_TTL_SECONDS:-600}'
      AUTH_ADMIN_BREAK_GLASS_MAX_TTL_SECONDS: '${AUTH_ADMIN_BREAK_GLASS_MAX_TTL_SECONDS:-3600}'
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - '${AUTH_PORT:-3005}:${AUTH_PORT:-3005}'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          const p = process.env.PORT || '3005';
          fetch('http://127.0.0.1:' + p + '/api/auth/v1/health')
            .then((response) => process.exit(response.ok ? 0 : 1))
            .catch(() => process.exit(1));
      interval: 10s
      timeout: 5s
      retries: 8

  gateway:
    profiles: ['local-dev', 'staging-e2e', 'staging-e2e-real']
    restart: unless-stopped
    build:
      context: .
      dockerfile: gateway/Dockerfile
    environment:
      PORT: '${GATEWAY_PORT}'
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_NAME: '${GATEWAY_DB_NAME}'
      DB_USER: '${GATEWAY_DB_RUNTIME_USER}'
      DB_PASSWORD: '${GATEWAY_DB_RUNTIME_PASSWORD}'
      DB_MIGRATION_USER: '${GATEWAY_DB_MIGRATION_USER}'
      DB_MIGRATION_PASSWORD: '${GATEWAY_DB_MIGRATION_PASSWORD}'
      GATEWAY_AUTH_BASE_URL: '${GATEWAY_AUTH_BASE_URL}'
      GATEWAY_AUTH_REQUEST_TIMEOUT_MS: '${GATEWAY_AUTH_REQUEST_TIMEOUT_MS}'
      GATEWAY_INDEXER_GRAPHQL_URL: '${GATEWAY_INDEXER_GRAPHQL_URL}'
      GATEWAY_INDEXER_REQUEST_TIMEOUT_MS: '${GATEWAY_INDEXER_REQUEST_TIMEOUT_MS}'
      GATEWAY_ORACLE_BASE_URL: '${GATEWAY_ORACLE_BASE_URL:-}'
      GATEWAY_ORACLE_SERVICE_API_KEY: '${GATEWAY_ORACLE_SERVICE_API_KEY:-}'
      GATEWAY_ORACLE_SERVICE_API_SECRET: '${GATEWAY_ORACLE_SERVICE_API_SECRET:-}'
      GATEWAY_TREASURY_BASE_URL: '${GATEWAY_TREASURY_BASE_URL:-}'
      GATEWAY_TREASURY_SERVICE_API_KEY: '${GATEWAY_TREASURY_SERVICE_API_KEY:-}'
      GATEWAY_TREASURY_SERVICE_API_SECRET: '${GATEWAY_TREASURY_SERVICE_API_SECRET:-}'
      GATEWAY_RECONCILIATION_BASE_URL: '${GATEWAY_RECONCILIATION_BASE_URL:-}'
      GATEWAY_RICARDIAN_BASE_URL: '${GATEWAY_RICARDIAN_BASE_URL:-}'
      GATEWAY_RICARDIAN_SERVICE_API_KEY: '${GATEWAY_RICARDIAN_SERVICE_API_KEY:-}'
      GATEWAY_RICARDIAN_SERVICE_API_SECRET: '${GATEWAY_RICARDIAN_SERVICE_API_SECRET:-}'
      GATEWAY_NOTIFICATIONS_BASE_URL: '${GATEWAY_NOTIFICATIONS_BASE_URL:-}'
      GATEWAY_ALLOW_INSECURE_DOWNSTREAM_AUTH: '${GATEWAY_ALLOW_INSECURE_DOWNSTREAM_AUTH:-false}'
      GATEWAY_SETTLEMENT_RUNTIME: '${GATEWAY_SETTLEMENT_RUNTIME:-}'
      GATEWAY_RPC_URL: '${GATEWAY_RPC_URL}'
      GATEWAY_RPC_FALLBACK_URLS: '${GATEWAY_RPC_FALLBACK_URLS:-}'
      GATEWAY_RPC_READ_TIMEOUT_MS: '${GATEWAY_RPC_READ_TIMEOUT_MS}'
      GATEWAY_CHAIN_ID: '${GATEWAY_CHAIN_ID}'
      GATEWAY_EXPLORER_BASE_URL: '${GATEWAY_EXPLORER_BASE_URL:-}'
      GATEWAY_ESCROW_ADDRESS: '${GATEWAY_ESCROW_ADDRESS}'
      GATEWAY_USDC_ADDRESS: '${GATEWAY_USDC_ADDRESS:-}'
      GATEWAY_ENABLE_MUTATIONS: '${GATEWAY_ENABLE_MUTATIONS}'
      GATEWAY_WRITE_ALLOWLIST: '${GATEWAY_WRITE_ALLOWLIST}'
      GATEWAY_CORS_ALLOWED_ORIGINS: '${GATEWAY_CORS_ALLOWED_ORIGINS}'
      GATEWAY_CORS_ALLOW_NO_ORIGIN: '${GATEWAY_CORS_ALLOW_NO_ORIGIN}'
      GATEWAY_RATE_LIMIT_ENABLED: '${GATEWAY_RATE_LIMIT_ENABLED}'
      GATEWAY_RATE_LIMIT_REDIS_URL: '${GATEWAY_RATE_LIMIT_REDIS_URL}'
      GATEWAY_RATE_LIMIT_FAIL_OPEN: '${GATEWAY_RATE_LIMIT_FAIL_OPEN:-false}'
      GATEWAY_COMMIT_SHA: '${GATEWAY_COMMIT_SHA}'
      GATEWAY_BUILD_TIME: '${GATEWAY_BUILD_TIME}'
    depends_on:
      postgres-init:
        condition: service_completed_successfully
      auth:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '${GATEWAY_PORT:-3600}:${GATEWAY_PORT:-3600}'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - |
          const p = process.env.PORT || '3600';
          fetch('http://127.0.0.1:' + p + '/api/dashboard-gateway/v1/healthz')
            .then((response) => process.exit(response.ok ? 0 : 1))
            .catch(() => process.exit(1));
