        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/claims/unpause:
    post:
      tags: [Governance]
      summary: Unpause claim withdrawals
      description: Maps to on-chain `unpauseClaims()`.
      operationId: unpauseClaims
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Claim unpause accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/treasury/sweep:
    post:
      tags: [Governance]
      summary: Trigger treasury sweep
      description: |
        Maps to on-chain `claimTreasury()`.

        The contract allows any caller to trigger `claimTreasury()` as long as claim withdrawals are not paused. The gateway is expected to restrict this endpoint to authorized operator roles.
      operationId: claimTreasury
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Treasury sweep accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/treasury/payout-receiver/proposals:
    post:
      tags: [Governance]
      summary: Propose treasury payout receiver rotation
      description: Maps to on-chain `proposeTreasuryPayoutAddressUpdate(address)`.
      operationId: proposeTreasuryPayoutReceiverUpdate
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TreasuryPayoutReceiverProposalRequest'
      responses:
        '202':
          description: Proposal accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/treasury/payout-receiver/proposals/{proposalId}/approve:
    post:
      tags: [Governance]
      summary: Approve treasury payout receiver rotation
      operationId: approveTreasuryPayoutReceiverUpdate
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Approval accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/treasury/payout-receiver/proposals/{proposalId}/execute:
    post:
      tags: [Governance]
      summary: Execute treasury payout receiver rotation
      operationId: executeTreasuryPayoutReceiverUpdate
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Execution accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/treasury/payout-receiver/proposals/{proposalId}/cancel-expired:
    post:
      tags: [Governance]
      summary: Cancel expired treasury payout receiver proposal
      operationId: cancelExpiredTreasuryPayoutReceiverUpdate
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Cancellation accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/oracle/disable-emergency:
    post:
      tags: [Governance]
      summary: Emergency disable oracle and pause protocol
      description: Maps to on-chain `disableOracleEmergency()`.
      operationId: disableOracleEmergency
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Emergency disable accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/oracle/proposals:
    post:
      tags: [Governance]
      summary: Propose oracle address update
      description: |
        Maps to on-chain `proposeOracleUpdate(address)`.
        This is the supported recovery path after `disableOracleEmergency()`; there is no direct `enableOracle()` call in the current contract.
      operationId: proposeOracleUpdate
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OracleUpdateProposalRequest'
      responses:
        '202':
          description: Proposal accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/oracle/proposals/{proposalId}/approve:
    post:
      tags: [Governance]
      summary: Approve oracle update proposal
      operationId: approveOracleUpdate
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Approval accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/oracle/proposals/{proposalId}/execute:
    post:
      tags: [Governance]
      summary: Execute oracle update proposal
      operationId: executeOracleUpdate
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Execution accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/oracle/proposals/{proposalId}/cancel-expired:
    post:
      tags: [Governance]
      summary: Cancel expired oracle update proposal
      operationId: cancelExpiredOracleUpdateProposal
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/ProposalId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Cancellation accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /compliance/decisions:
    post:
      tags: [Compliance]
      summary: Create compliance decision record
      description: |
        Contract-first endpoint for compliance decisioning that gates oracle progression.

        This endpoint is grounded in `docs/runbooks/compliance-boundary-kyb-kyt-sanctions.md`, which defines fail-closed enforcement and audit requirements.

        The gateway owns the append-only compliance decision ledger in its Postgres database. Provider
        integrations remain out of scope; this endpoint records the authoritative control-plane decision
        used by the dashboard and gateway orchestration path.
      operationId: createComplianceDecision
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceDecisionCreateRequest'
      responses:
        '201':
          description: Decision recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceDecisionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /compliance/decisions/{decisionId}:
    get:
      tags: [Compliance]
      summary: Get compliance decision by id
      operationId: getComplianceDecision
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Compliance decision detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceDecisionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /compliance/trades/{tradeId}:
    get:
      tags: [Compliance]
      summary: Get current compliance status for a trade
      operationId: getTradeComplianceStatus
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/TradeId'
      responses:
        '200':
          description: Current compliance state for the trade.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceTradeStatusResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /compliance/trades/{tradeId}/decisions:
    get:
      tags: [Compliance]
      summary: List compliance decisions for a trade
      operationId: listTradeComplianceDecisions
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/TradeId'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Compliance decision history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceDecisionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /compliance/trades/{tradeId}/block-oracle-progression:
    post:
      tags: [Compliance]
      summary: Block oracle progression for a trade
      description: |
        Contract-first off-chain control that prevents the oracle worker from progressing a trade.

        This does not change on-chain trade state directly. It is an operator/compliance control that must be consumed by the gateway/oracle orchestration path.

        The gateway stores oracle progression block state in its Postgres database as the canonical control-plane source of truth.
      operationId: blockOracleProgression
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/TradeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceOperationalControlRequest'
      responses:
        '202':
          description: Block accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceTradeStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /compliance/trades/{tradeId}/resume-oracle-progression:
    post:
      tags: [Compliance]
      summary: Resume oracle progression for a trade
      description: |
        Contract-first off-chain control that clears a prior oracle progression block.

        Resume requires an authorized gateway write principal together with the latest effective
        compliance decision evaluating to `ALLOW`. When the effective decision uses
        `reasonCode=CMP_OVERRIDE_ACTIVE`, the recorded override window must still be active.
      operationId: resumeOracleProgression
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/TradeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceOperationalControlRequest'
      responses:
        '202':
          description: Resume accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceTradeStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
components:
  securitySchemes:
    sessionBearer:
      type: http
      scheme: bearer
      bearerFormat: session-id
      description: |
        Session bearer token issued by the in-repo auth service (`/api/auth/v1/login`) after wallet-signature login.

        Repo evidence:
        - `auth/src/api/controller.ts`
        - `auth/src/middleware/middleware.ts`
        - `auth/README.md`

        The gateway must resolve the session subject and enforce endpoint-level role policy. Governance and compliance mutations require operator/admin authorization.
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
      description: Client-generated request identifier for end-to-end traceability. Gateway should generate one if absent.
    XCorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
      description: Stable correlation identifier linking dashboard actions to downstream service logs, trade events, and incident artifacts.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: Required for all mutation endpoints to deduplicate repeated operator intent.
    ProposalId:
      name: proposalId
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
      description: On-chain governance proposal identifier.
    TradeId:
      name: tradeId
      in: path
      required: true
      schema:
        type: string
      description: Web3layer trade identifier used across chain events, indexer evidence, and operator workflows.
  responses:
    BadRequestError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Authentication failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Authenticated subject lacks required role or scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Request conflicts with current state or prior idempotent request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [service, status]
          properties:
            service:
              type: string
              const: dashboard-gateway
            status:
              type: string
              const: ok
        timestamp:
          type: string
          format: date-time
    ReadyResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
        data:
          type: object
          required: [service, ready]
          properties:
            service:
              type: string
              const: dashboard-gateway
            ready:
              type: boolean
            dependencies:
              type: array
              items:
                type: object
                required: [name, status]
                properties:
                  name:
                    type: string
                  status:
                    type: string
                    enum: [ok, degraded, unavailable]
                  detail:
                    type: string
        timestamp:
          type: string
          format: date-time
    VersionResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [service, version, commitSha, buildTime]
          properties:
            service:
              type: string
              const: dashboard-gateway
            version:
              type: string
            commitSha:
              type: string
            buildTime:
              type: string
              format: date-time
            sourceRepo:
              type: string
              const: Agroasys.Web3layer
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [success, error, timestamp]
      properties:
        success:
          type: boolean
          const: false
        error:
          $ref: '#/components/schemas/ErrorObject'
        timestamp:
          type: string
          format: date-time
    ErrorObject:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          examples: [AUTH_UNAUTHORIZED, GOV_STATE_CONFLICT, CMP_PROVIDER_UNAVAILABLE]
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        traceId:
          type: string
        requestId:
          type: string
    EvidenceLink:
      type: object
      required: [kind, uri]
      properties:
        kind:
          type: string
          enum: [runbook, incident, ticket, tx, event, document, log, dashboard, other]
        uri:
          type: string
        note:
          type: string
    MutationAuditInput:
      type: object
      required: [reason, evidenceLinks, ticketRef]
      properties:
        reason:
          type: string
          minLength: 8
          maxLength: 2000
        evidenceLinks:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/EvidenceLink'
        ticketRef:
          type: string
          minLength: 2
          maxLength: 128
    MutationAuditRecord:
      allOf:
        - $ref: '#/components/schemas/MutationAuditInput'
        - type: object
          required: [actorSessionId, actorWallet, actorRole, createdAt, requestedBy]
          properties:
            actorSessionId:
              type: string
            actorWallet:
              type: string
            actorRole:
              type: string
            createdAt:
              type: string
              format: date-time
            requestedBy:
              type: string
            approvedBy:
              type: array
              items:
                type: string
    GovernanceActionCategory:
      type: string
      enum:
        - pause
        - unpause
        - claims_pause
        - claims_unpause
        - treasury_sweep
        - treasury_payout_receiver_update
        - oracle_disable_emergency
        - oracle_update
    GovernanceActionStatus:
      type: string
      enum:
        - requested
        - submitted
        - pending_approvals
        - approved
        - executed
        - cancelled
        - expired
        - stale
        - failed
    GovernanceStatus:
      type: object
      required:
        - paused
        - claimsPaused
        - oracleActive
        - oracleAddress
        - treasuryAddress
        - treasuryPayoutAddress
        - governanceApprovalsRequired
        - governanceTimelockSeconds
      properties:
        paused:
          type: boolean
        claimsPaused:
          type: boolean
        oracleActive:
          type: boolean
        oracleAddress:
          type: string
        treasuryAddress:
          type: string
        treasuryPayoutAddress:
          type: string
        governanceApprovalsRequired:
          type: integer
          minimum: 1
        governanceTimelockSeconds:
          type: integer
          minimum: 0
          description: Derived from on-chain `governanceTimelock`.
        requiredAdminCount:
          type: integer
          minimum: 1
          description: Current required admin quorum for unpause flow.
        hasActiveUnpauseProposal:
          type: boolean
        activeUnpauseApprovals:
          type: integer
          minimum: 0
        activeOracleProposalIds:
          type: array
          items:
            type: integer
            minimum: 0
        activeTreasuryPayoutReceiverProposalIds:
          type: array
          items:
            type: integer
            minimum: 0
    GovernanceStatusResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/GovernanceStatus'
        timestamp:
          type: string
          format: date-time
    GovernanceAction:
      type: object
      required:
        - actionId
        - intentKey
        - category
        - status
        - contractMethod
        - audit
        - createdAt
      properties:
        actionId:
          type: string
        intentKey:
          type: string
        proposalId:
          type: integer
          minimum: 0
          nullable: true
        category:
          $ref: '#/components/schemas/GovernanceActionCategory'
        status:
          $ref: '#/components/schemas/GovernanceActionStatus'
        contractMethod:
          type: string
        txHash:
          type: string
          nullable: true
        extrinsicHash:
          type: string
          nullable: true
        blockNumber:
          type: integer
          nullable: true
        tradeId:
          type: string
          nullable: true
        chainId:
          type: string
          nullable: true
        targetAddress:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        executedAt:
          type: string
          format: date-time
          nullable: true
        audit:
          $ref: '#/components/schemas/MutationAuditRecord'
    GovernanceActionResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/GovernanceAction'
        timestamp:
          type: string
          format: date-time
    GovernanceActionListResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/GovernanceAction'
            nextCursor:
              type: string
              nullable: true
        timestamp:
          type: string
          format: date-time
    GovernanceMutationRequest:
      type: object
      required: [audit]
      properties:
        audit:
          $ref: '#/components/schemas/MutationAuditInput'
    GovernanceActionAcceptedResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [actionId, intentKey, category, status, acceptedAt]
          properties:
            actionId:
              type: string
            intentKey:
              type: string
            proposalId:
              type: integer
              minimum: 0
              nullable: true
            category:
              $ref: '#/components/schemas/GovernanceActionCategory'
            status:
              $ref: '#/components/schemas/GovernanceActionStatus'
            acceptedAt:
              type: string
              format: date-time
            expiresAt:
              type: string
              format: date-time
              nullable: true
        timestamp:
          type: string
          format: date-time
    TreasuryPayoutReceiverProposalRequest:
      type: object
      required: [newPayoutReceiver, audit]
      properties:
        newPayoutReceiver:
          type: string
          description: Proposed new payout receiver address.
        audit:
          $ref: '#/components/schemas/MutationAuditInput'
    OracleUpdateProposalRequest:
      type: object
      required: [newOracleAddress, audit]
      properties:
        newOracleAddress:
          type: string
        audit:
          $ref: '#/components/schemas/MutationAuditInput'
    ComplianceDecisionType:
      type: string
      enum: [KYB, KYT, SANCTIONS]
    ComplianceDecisionResult:
      type: string
      enum: [ALLOW, DENY]
      description: |
        Result states are intentionally limited to the policy-defined enforcement outcomes in
        `docs/runbooks/compliance-boundary-kyb-kyt-sanctions.md`.

        Emergency override is represented as `result=ALLOW` together with `reasonCode=CMP_OVERRIDE_ACTIVE`
        and the override audit fields below. Provider unavailability and unknown outcomes remain fail-closed
        as `result=DENY`.
    ComplianceBlockState:
      type: string
      enum: [not_blocked, blocked, resume_pending]
    ComplianceDecisionCreateRequest:
      type: object
      required:
        - tradeId
        - decisionType
        - result
        - reasonCode
        - provider
        - providerRef
        - subjectId
        - subjectType
        - correlationId
        - audit
      properties:
        tradeId:
          type: string
        decisionType:
          $ref: '#/components/schemas/ComplianceDecisionType'
        result:
          $ref: '#/components/schemas/ComplianceDecisionResult'
        reasonCode:
          type: string
          description: Stable code such as `CMP_PROVIDER_UNAVAILABLE` or `CMP_SANCTIONS_MATCH`.
        provider:
          type: string
        providerRef:
          type: string
        subjectId:
          type: string
        subjectType:
          type: string
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        overrideWindowEndsAt:
          type: string
          format: date-time
          nullable: true
          description: Used when `reasonCode=CMP_OVERRIDE_ACTIVE` to record the approved override window.
        correlationId:
          type: string
        audit:
          $ref: '#/components/schemas/MutationAuditInput'
    ComplianceDecision:
      type: object
      required:
        - decisionId
        - tradeId
        - decisionType
        - result
        - reasonCode
        - provider
        - providerRef
        - subjectId
        - subjectType
        - correlationId
        - decidedAt
        - audit
      properties:
        decisionId:
          type: string
        tradeId:
          type: string
        decisionType:
          $ref: '#/components/schemas/ComplianceDecisionType'
        result:
          $ref: '#/components/schemas/ComplianceDecisionResult'
        reasonCode:
          type: string
        provider:
          type: string
        providerRef:
          type: string
        subjectId:
          type: string
        subjectType:
          type: string
        riskLevel:
          type: string
          nullable: true
        correlationId:
          type: string
        decidedAt:
          type: string
          format: date-time
        overrideWindowEndsAt:
          type: string
          format: date-time
          nullable: true
        blockState:
          $ref: '#/components/schemas/ComplianceBlockState'
        audit:
          $ref: '#/components/schemas/MutationAuditRecord'
    ComplianceDecisionResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/ComplianceDecision'
        timestamp:
          type: string
          format: date-time
    ComplianceDecisionListResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ComplianceDecision'
            nextCursor:
              type: string
              nullable: true
        timestamp:
          type: string
          format: date-time
    ComplianceTradeStatus:
      type: object
      required:
        - tradeId
        - currentResult
        - oracleProgressionBlocked
        - latestDecisionId
        - updatedAt
      properties:
        tradeId:
          type: string
        currentResult:
          $ref: '#/components/schemas/ComplianceDecisionResult'
        oracleProgressionBlocked:
          type: boolean
        blockState:
          $ref: '#/components/schemas/ComplianceBlockState'
        latestDecisionId:
          type: string
        latestReasonCode:
          type: string
        latestProvider:
          type: string
        latestCorrelationId:
          type: string
        updatedAt:
          type: string
          format: date-time
    ComplianceTradeStatusResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/ComplianceTradeStatus'
        timestamp:
          type: string
          format: date-time
    ComplianceOperationalControlRequest:
      type: object
      required: [reasonCode, audit]
      properties:
        reasonCode:
          type: string
        audit:
          $ref: '#/components/schemas/MutationAuditInput'
        decisionId:
          type: string
          nullable: true
          description: Associated decision record when one exists.
