openapi: 3.1.0
info:
  title: Web3layer Dashboard Gateway API
  version: 0.1.0
  summary: Contract-first admin/operator gateway for the CTSP dashboard.
  description: |
    Contract-first API specification for the CTSP admin/operator dashboard to interact with Agroasys Web3layer.

    Discovery outcome:
    - Dedicated in-repo dashboard gateway runtime: `gateway/` Express + TypeScript service.
    - Existing repo auth/session surface: `auth` service issues Bearer session tokens.
    - Existing repo governance source of truth: `contracts/src/AgroasysEscrow.sol`, `sdk/src/modules/adminSDK.ts`, and governance runbooks.
    - Existing repo compliance source of truth: policy/runbooks only; no dedicated compliance HTTP service exists yet.

    This specification is therefore contract-first for the dashboard gateway, but it is grounded in existing repo truth.

    Gateway authorization policy:
    - Auth uses existing auth-service Bearer sessions.
    - Gateway role mapping is derived from current auth role `admin`, which maps to `operator:read` and `operator:write`.
    - All mutation endpoints additionally require `GATEWAY_ENABLE_MUTATIONS=true` and membership in `GATEWAY_WRITE_ALLOWLIST`.
    - Governance mutations are accepted into a durable queue; a separate executor process performs the AdminSDK-backed chain execution and writes the final outcome back to the action ledger.
servers:
  - url: http://127.0.0.1:3600/api/dashboard-gateway/v1
    description: Local contract-first gateway base URL.
  - url: https://gateway.agroasys.example/api/dashboard-gateway/v1
    description: Production placeholder for future gateway deployment.
tags:
  - name: System
  - name: Governance
  - name: Compliance
security:
  - sessionBearer: []
paths:
  /healthz:
    get:
      tags: [System]
      summary: Liveness probe
      security: []
      operationId: getHealthz
      responses:
        '200':
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags: [System]
      summary: Readiness probe
      security: []
      operationId: getReadyz
      responses:
        '200':
          description: Dependencies are ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Dependencies are not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /version:
    get:
      tags: [System]
      summary: Build and revision metadata
      security: []
      operationId: getVersion
      responses:
        '200':
          description: Version metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /governance/status:
    get:
      tags: [Governance]
      summary: Current protocol governance status
      operationId: getGovernanceStatus
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
      responses:
        '200':
          description: Snapshot of on-chain governance-relevant status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceStatusResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /governance/actions:
    get:
      tags: [Governance]
      summary: List recent governance actions
      operationId: listGovernanceActions
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/GovernanceActionCategory'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/GovernanceActionStatus'
        - name: tradeId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Governance action history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /governance/actions/{actionId}:
    get:
      tags: [Governance]
      summary: Get governance action by id
      operationId: getGovernanceAction
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: actionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Governance action detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /governance/pause:
    post:
      tags: [Governance]
      summary: Pause protocol mutations
      description: |
        Maps to on-chain `pause()` through the AdminSDK.
      operationId: pauseProtocol
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Governance action accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/unpause/proposal:
    post:
      tags: [Governance]
      summary: Create the active unpause proposal
      description: |
        Maps to on-chain `proposeUnpause()`. The contract supports a single active unpause proposal rather than a proposal-id keyed collection.
      operationId: proposeUnpause
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Proposal accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/unpause/proposal/approve:
    post:
      tags: [Governance]
      summary: Approve the active unpause proposal
      description: Maps to on-chain `approveUnpause()`.
      operationId: approveUnpause
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Approval accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/unpause/proposal/cancel:
    post:
      tags: [Governance]
      summary: Cancel the active unpause proposal
      description: Maps to on-chain `cancelUnpauseProposal()`.
      operationId: cancelUnpauseProposal
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Cancellation accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceActionAcceptedResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/claims/pause:
    post:
      tags: [Governance]
      summary: Pause claim withdrawals
      description: Maps to on-chain `pauseClaims()`.
      operationId: pauseClaims
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceMutationRequest'
      responses:
        '202':
          description: Claim pause accepted.
          content:
            application/json:
