          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/OverviewSnapshot'
        timestamp:
          type: string
          format: date-time
    OperationsState:
      type: string
      enum: [healthy, degraded, unavailable, stale]
    OperationsServiceStatus:
      type: object
      required:
        - key
        - name
        - state
        - source
        - checkedAt
        - lastSuccessAt
        - freshnessMs
        - staleAfterMs
        - latencyMs
      properties:
        key:
          type: string
          examples: [oracle, indexer, reconciliation, treasury, ricardian, notifications]
        name:
          type: string
        state:
          $ref: '#/components/schemas/OperationsState'
        source:
          type: string
          description: Probe source identifier such as `indexer_graphql` or `oracle_http`.
        checkedAt:
          type: string
          format: date-time
          description: Timestamp when this service status was checked for the snapshot.
        lastSuccessAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          description: Last successful probe timestamp, or null when no success baseline exists.
        freshnessMs:
          anyOf:
            - type: integer
              minimum: 0
            - type: 'null'
          description: Milliseconds since `lastSuccessAt`; null when the service has never had a successful probe baseline.
        staleAfterMs:
          type: integer
          minimum: 1
        latencyMs:
          anyOf:
            - type: integer
              minimum: 0
            - type: 'null'
          description: Probe latency in milliseconds when available.
        detail:
          type: string
