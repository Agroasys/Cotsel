          description: Resume accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceTradeStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
components:
  securitySchemes:
    sessionBearer:
      type: http
      scheme: bearer
      bearerFormat: session-id
      description: |
        Session bearer token issued by the in-repo auth service.

        Production path:
        - trusted upstream session exchange via `/api/auth/v1/session/exchange/agroasys`

        Compatibility path:
        - `/api/auth/v1/login` after explicit wallet-signature login when that legacy flow is enabled

        Repo evidence:
        - `auth/src/api/controller.ts`
        - `auth/src/middleware/middleware.ts`
        - `auth/README.md`

        The gateway must resolve the session subject and enforce endpoint-level role policy. Governance and compliance mutations require operator/admin authorization.
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
      description: Client-generated request identifier for end-to-end traceability. Gateway should generate one if absent.
    XCorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
      description: Stable correlation identifier linking dashboard actions to downstream service logs, trade events, and incident artifacts.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
      description: Required for all mutation endpoints to deduplicate repeated operator intent.
    ProposalId:
      name: proposalId
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
      description: On-chain governance proposal identifier.
    TradeId:
      name: tradeId
      in: path
      required: true
      schema:
        type: string
    SettlementHandoffId:
      name: handoffId
      in: path
      required: true
      schema:
        type: string
      description: Cotsel trade identifier used across chain events, indexer evidence, and operator workflows.
    AccountingPeriodId:
      name: periodId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    BatchId:
      name: batchId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    BadRequestError:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Authentication failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Authenticated subject lacks required role or scope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Request conflicts with current state or prior idempotent request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    HealthResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [service, status]
          properties:
            service:
              type: string
              const: dashboard-gateway
            status:
              type: string
              const: ok
        timestamp:
          type: string
          format: date-time
    ReadyResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
        data:
          type: object
          required: [service, ready]
          properties:
            service:
              type: string
              const: dashboard-gateway
            ready:
              type: boolean
            dependencies:
              type: array
              items:
                type: object
                required: [name, status]
                properties:
                  name:
                    type: string
                  status:
                    type: string
                    enum: [ok, degraded, unavailable]
                  detail:
                    type: string
        timestamp:
          type: string
          format: date-time
    VersionResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          type: object
          required: [service, version, commitSha, buildTime]
          properties:
            service:
              type: string
              const: dashboard-gateway
            version:
              type: string
            commitSha:
              type: string
            buildTime:
              type: string
              format: date-time
            sourceRepo:
              type: string
              const: Cotsel
        timestamp:
          type: string
          format: date-time
    AuthServiceRole:
      type: string
      enum: [buyer, supplier, admin, oracle]
    GatewayRole:
      type: string
      enum: [operator:read, operator:write]
    OperatorCapabilitySubject:
      type: object
      required: [accountId, userId, authRole, gatewayRoles]
      properties:
        accountId:
          type: string
        userId:
          type: string
        walletAddress:
          type: string
          nullable: true
        authRole:
          $ref: '#/components/schemas/AuthServiceRole'
        gatewayRoles:
          type: array
          items:
            $ref: '#/components/schemas/GatewayRole'
    OperatorRouteCapabilities:
      type: object
      required: [overviewRead, operationsRead, tradesRead, governanceRead, complianceRead]
      properties:
        overviewRead:
          type: boolean
        operationsRead:
          type: boolean
        tradesRead:
          type: boolean
        governanceRead:
          type: boolean
        complianceRead:
          type: boolean
    OperatorActionCapabilities:
      type: object
      required: [governanceWrite, complianceWrite]
      properties:
        governanceWrite:
          type: boolean
        complianceWrite:
          type: boolean
    OperatorWriteAccess:
      type: object
      required: [mutationsConfigured, allowlisted, effective]
      properties:
        mutationsConfigured:
          type: boolean
          description: True when gateway mutation routes are enabled in config.
        allowlisted:
          type: boolean
          description: True when the authenticated session matches GATEWAY_WRITE_ALLOWLIST.
        effective:
          type: boolean
          description: True only when the session has operator write role, mutations are enabled, and the session is allowlisted.
    OperatorCapabilitiesSnapshot:
      type: object
      required: [subject, routes, actions, writeAccess]
      properties:
        subject:
          $ref: '#/components/schemas/OperatorCapabilitySubject'
        routes:
          $ref: '#/components/schemas/OperatorRouteCapabilities'
        actions:
          $ref: '#/components/schemas/OperatorActionCapabilities'
        writeAccess:
          $ref: '#/components/schemas/OperatorWriteAccess'
    OperatorCapabilitiesResponse:
      type: object
      required: [success, data, timestamp]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/OperatorCapabilitiesSnapshot'
        timestamp:
          type: string
          format: date-time
    OverviewFeedStatus:
      type: object
      required: [source, queriedAt, freshAt, available]
      properties:
        source:
          type: string
          enum: [indexer_graphql, chain_rpc, gateway_ledger]
          description: Identifies which backend feed provided (or attempted to provide) this data.
        queriedAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          description: ISO timestamp of when the gateway successfully queried this feed for the current snapshot; null when the feed is unavailable.
        freshAt:
          anyOf:
            - type: string
              format: date-time
            - type: 'null'
          description: Source-authoritative freshness timestamp for this feed; null when the feed is unavailable.
        available:
          type: boolean
          description: False when the feed returned an error or timed out for this request.
    OverviewTradeFeedStatus:
      allOf:
        - $ref: '#/components/schemas/OverviewFeedStatus'
        - type: object
          required: [lastIndexedAt, lastProcessedBlock, lastTradeEventAt]
          properties:
            lastIndexedAt:
              anyOf:
                - type: string
                  format: date-time
                - type: 'null'
              description: Indexer watermark timestamp for the most recently processed block; mirrors `freshAt` when available.
            lastProcessedBlock:
              anyOf:
                - type: string
                - type: 'null'
              description: Block number of the last block processed by the indexer; null when the feed is unavailable.
            lastTradeEventAt:
              anyOf:
                - type: string
                  format: date-time
                - type: 'null'
              description: Timestamp of the last trade lifecycle event indexed; null when no events have been indexed yet or the feed is unavailable.
    OverviewTradeKpis:
      type: object
      required: [total, byStatus]
      properties:
        total:
          type: integer
          minimum: 0
          description: Total number of trades ever locked, as tracked by the indexer overview snapshot.
        byStatus:
          type: object
          required: [locked, stage_1, stage_2, completed, disputed, cancelled]
          properties:
            locked:
              type: integer
              minimum: 0
            stage_1:
              type: integer
              minimum: 0
            stage_2:
              type: integer
              minimum: 0
            completed:
              type: integer
              minimum: 0
            disputed:
              type: integer
              minimum: 0
            cancelled:
              type: integer
              minimum: 0
    OverviewPosture:
      type: object
      required: [paused, claimsPaused, oracleActive]
      description: |
        Current on-chain protocol posture derived from chain RPC.
        Null when the governance feed is unavailable (`feedFreshness.governance.available = false`).
      properties:
        paused:
          type: boolean
        claimsPaused:
          type: boolean
        oracleActive:
          type: boolean
    OverviewSnapshot:
      type: object
      required: [kpis, feedFreshness]
      properties:
        kpis:
          type: object
          required: [trades, compliance]
          properties:
            trades:
              $ref: '#/components/schemas/OverviewTradeKpis'
            compliance:
              type: object
              required: [blockedTrades]
              properties:
                blockedTrades:
                  type: integer
                  minimum: 0
                  description: Number of trades currently blocked by an active compliance hold.
        posture:
          anyOf:
            - $ref: '#/components/schemas/OverviewPosture'
            - type: 'null'
          description: Null when the chain RPC feed is unavailable.
        feedFreshness:
          type: object
          required: [trades, governance, compliance]
          properties:
            trades:
              $ref: '#/components/schemas/OverviewTradeFeedStatus'
            governance:
              $ref: '#/components/schemas/OverviewFeedStatus'
            compliance:
              $ref: '#/components/schemas/OverviewFeedStatus'
