  /compliance/trades/{tradeId}/block-oracle-progression:
    post:
      tags: [Compliance]
      summary: Block oracle progression for a trade
      description: |
        Contract-first off-chain control that prevents the oracle worker from progressing a trade.

        This does not change on-chain trade state directly. It is an operator/compliance control that must be consumed by the gateway/oracle orchestration path.

        The gateway stores oracle progression block state in its Postgres database as the canonical control-plane source of truth.
      operationId: blockOracleProgression
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/TradeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceOperationalControlRequest'
      responses:
        '202':
          description: Block accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceTradeStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /compliance/trades/{tradeId}/resume-oracle-progression:
    post:
      tags: [Compliance]
      summary: Resume oracle progression for a trade
      description: |
        Contract-first off-chain control that clears a prior oracle progression block.

        Resume requires an authorized gateway write principal together with the latest effective
        compliance decision evaluating to `ALLOW`. When the effective decision uses
        `reasonCode=CMP_OVERRIDE_ACTIVE`, the recorded override window must still be active.
      operationId: resumeOracleProgression
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/TradeId'
      requestBody:
        required: true
