openapi: 3.1.0
info:
  title: Cotsel Dashboard Gateway API
  version: 0.1.0
  summary: Contract-first admin/operator gateway for Cotsel-Dash.
  description: |
    Contract-first API specification for the Cotsel-Dash admin/operator dashboard to interact with Cotsel.

    Discovery outcome:
    - Dedicated in-repo dashboard gateway runtime: `gateway/` Express + TypeScript service.
    - Existing repo auth/session surface: `auth` service issues Bearer session tokens.
    - Existing repo governance source of truth: `contracts/src/AgroasysEscrow.sol`, `sdk/src/modules/adminSDK.ts`, and governance runbooks.
    - Existing repo compliance source of truth: policy/runbooks only; no dedicated compliance HTTP service exists yet.

    This specification is therefore contract-first for the dashboard gateway, but it is grounded in existing repo truth.

    Gateway authorization policy:
    - Auth uses existing auth-service Bearer sessions.
    - Gateway role mapping is derived from current auth role `admin`, which maps to `operator:read` and `operator:write`.
    - All mutation endpoints additionally require `GATEWAY_ENABLE_MUTATIONS=true` and membership in `GATEWAY_WRITE_ALLOWLIST`.
    - Governance mutations use a two-endpoint direct-sign model (ADR-0411): (1) `POST /governance/<action>/prepare` validates the session and pre-flight state, records audit intent, and returns the canonical backend-authored signing payload (`chainId`, `contractAddress`, `contractMethod`, `args`, `txRequest`, `signerWallet`, `preparedPayloadHash`); (2) `POST /governance/actions/:actionId/confirm` accepts the broadcast `txHash`, verifies it against the prepared payload when observable, and records either `broadcast` or `broadcast_pending_verification` status with monitoring state. The admin wallet signs and broadcasts between these two calls. Legacy `POST /governance/<action>` queue endpoints remain for executor-backed service roles only.
servers:
  - url: http://127.0.0.1:3600/api/dashboard-gateway/v1
    description: Local contract-first gateway base URL.
tags:
  - name: System
  - name: Auth
  - name: Access Logs
  - name: Settings
  - name: Approvals
  - name: Overview
  - name: Operations
  - name: Trades
  - name: Reconciliation
  - name: Ricardian
  - name: Evidence
  - name: Settlement
  - name: Governance
  - name: Treasury
  - name: Compliance
security:
  - sessionBearer: []
paths:
  /healthz:
    get:
      tags: [System]
      summary: Liveness probe
      security: []
      operationId: getHealthz
      responses:
        '200':
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /readyz:
    get:
      tags: [System]
      summary: Readiness probe
      security: []
      operationId: getReadyz
      responses:
        '200':
          description: Dependencies are ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Dependencies are not ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /version:
    get:
      tags: [System]
      summary: Build and revision metadata
      security: []
      operationId: getVersion
      responses:
        '200':
          description: Version metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /auth/capabilities:
    get:
      tags: [Auth]
      summary: Authenticated operator capability snapshot
      description: |
        Returns the backend-authoritative route and action capabilities for the current authenticated
        session so Cotsel-Dash can gate operator pages and controls from gateway truth.

        This route authenticates any valid session and does not require `operator:read`. Non-admin
        sessions therefore receive a successful response with empty gateway roles and all operator
        capabilities set to `false`.

        Write capabilities are derived from the existing gateway policy:
        - auth role `admin` maps to `operator:read` and `operator:write`
        - mutations also require `GATEWAY_ENABLE_MUTATIONS=true`
        - mutations additionally require the authenticated session to match `GATEWAY_WRITE_ALLOWLIST`
      operationId: getOperatorCapabilities
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
      responses:
        '200':
          description: Backend capability snapshot for the authenticated session.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorCapabilitiesResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /access-logs:
    post:
      tags: [Access Logs]
      summary: Append an operator access log entry
      description: |
        Append-only access-log mutation for Cotsel-Dash operator surfaces. The gateway derives actor,
        request, session, and network context from the authenticated request and applies stable
        masking/redaction to session and IP fields in the returned record.

        This mutation requires an admin session, `GATEWAY_ENABLE_MUTATIONS=true`, membership in
        `GATEWAY_WRITE_ALLOWLIST`, and an `Idempotency-Key` header.
      operationId: createAccessLogEntry
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessLogCreateRequest'
      responses:
        '201':
          description: Access log entry recorded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogEntryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '409':
          $ref: '#/components/responses/ConflictError'
    get:
      tags: [Access Logs]
      summary: List operator access log entries
      description: |
        Returns append-only access-log records for operator audit surfaces. Session and IP fields are
        returned as stable masked/fingerprint pairs so operators can correlate events without
        exposing raw bearer-session or client network identifiers.
      operationId: listAccessLogEntries
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: eventType
          in: query
          schema:
            type: string
        - name: outcome
          in: query
          schema:
            type: string
        - name: actorUserId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Access log list payload with freshness metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /access-logs/{entryId}:
    get:
      tags: [Access Logs]
      summary: Get a single access log entry by id
      operationId: getAccessLogEntry
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: entryId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Access log detail payload with freshness metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogEntryResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /settings/role-assignments:
    get:
      tags: [Settings]
      summary: List operator role assignments for dashboard settings
      description: |
        Returns role-assignment records from the gateway role-assignment ledger. This route is
        additive and read-only; it does not infer or fabricate assignments that are not present in
        the authoritative backend ledger.
      operationId: listRoleAssignments
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: gatewayRole
          in: query
          schema:
            type: string
        - name: authRole
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Role assignment list with source freshness metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleAssignmentListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /settings/audit-feed:
    get:
      tags: [Settings]
      summary: List operator audit-feed events for dashboard settings
      description: |
        Returns audit-feed events from the gateway audit ledger with explicit actor, event type,
        route, request identifiers, and freshness metadata for Cotsel-Dash Settings.
      operationId: listSettingsAuditFeed
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: eventType
          in: query
          schema:
            type: string
        - name: actorUserId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Audit feed list with source freshness metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditFeedListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /approvals:
    get:
      tags: [Approvals]
      summary: List maker-checker approval workflows for dashboard consumers
      description: |
        Returns read-only approval workflow summaries derived from the governance action ledger and
        live governance status reads. The route is additive and does not mutate governance state.
      operationId: listApprovalWorkflows
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/ApprovalWorkflowCategory'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Approval workflow summaries with freshness metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalWorkflowListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /approvals/{approvalId}:
    get:
      tags: [Approvals]
      summary: Get approval workflow detail by workflow id
      description: |
        Returns request, review, status, and execution metadata for a single maker-checker
        governance workflow. When live governance state cannot be read, the response remains
        additive and degrades explicitly with `available=false`.
      operationId: getApprovalWorkflow
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: approvalId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approval workflow detail with freshness metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalWorkflowDetailResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /overview:
    get:
      tags: [Overview]
      summary: Dashboard overview KPIs and operational posture
      description: |
        Aggregated overview surface for Cotsel-Dash. Returns trade counts by settlement stage,
        governance posture (paused / oracle active), compliance blocked-trade count, and
        per-feed query metadata so the dashboard can render operator trust indicators.

        All three backend feeds (indexer, chain RPC, and gateway compliance ledger) are queried
        in parallel. When a feed is unavailable, `feedFreshness.<feed>.available` is `false`,
        `feedFreshness.<feed>.freshAt` is `null`, the corresponding KPI values default to zero,
        and `posture` is `null` when the chain RPC feed is unavailable. The endpoint always returns
        HTTP 200 so the dashboard can render a partial view with degraded-feed indicators rather
        than a blank screen.

        Authoritative trade freshness comes from the indexer snapshot watermark, not from the
        gateway request timestamp. For the trades feed:
        - `feedFreshness.trades.queriedAt` is when the gateway asked the indexer for this snapshot
        - `feedFreshness.trades.freshAt` mirrors the indexer `lastIndexedAt` watermark
        - `feedFreshness.trades.lastProcessedBlock` identifies the last indexed block for the snapshot
      operationId: getOverview
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
      responses:
        '200':
          description: Overview KPIs and operational posture snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverviewResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /operations/summary:
    get:
      tags: [Operations]
      summary: Service health and incident summary snapshot
      description: |
        Authoritative operations read surface for Cotsel-Dash Operations pages.

        The gateway probes service dependencies and returns deterministic service states:
        - `healthy`: service probe succeeded within latency threshold
        - `degraded`: probe succeeded above latency threshold, or latest probe failed while recent success is still fresh
        - `unavailable`: probe failed and no recent successful baseline exists, or the service is not wired in gateway config
        - `stale`: latest probe failed and last successful baseline is older than `staleAfterMs`

        Incident summary is gateway-derived from non-healthy services and includes source and freshness timestamps for UI trust indicators.
      operationId: getOperationsSummary
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
      responses:
        '200':
          description: Operations snapshot with service health and incident summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationsSummaryResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /trades:
    get:
      tags: [Trades]
      summary: List dashboard trade records
      description: |
        Indexer-backed dashboard trade registry. This surface is read-only and combines:
        - indexed trade lifecycle state from `indexer/schema.graphql`
        - indexed trade-event history for timeline rendering
        - current gateway compliance ledger status, when available

        Amounts are normalized to display-scale USDC values for dashboard rendering.
      operationId: listTrades
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Trade registry records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /trades/{tradeId}:
    get:
      tags: [Trades]
      summary: Get trade detail by trade id
      operationId: getTrade
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/TradeId'
      responses:
        '200':
          description: Trade detail record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /reconciliation:
    get:
      tags: [Reconciliation]
      summary: List reconciliation handoff records for dashboard consumers
      description: |
        Operator read surface for reconciliation summaries and drift review. This contract is derived
        from the gateway settlement ledger and current trade-linked settlement projection.
      operationId: listReconciliation
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: tradeId
          in: query
          schema:
            type: string
        - name: reconciliationStatus
          in: query
          schema:
            $ref: '#/components/schemas/SettlementReconciliationStatus'
        - name: executionStatus
          in: query
          schema:
            $ref: '#/components/schemas/SettlementExecutionStatus'
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Reconciliation handoff summaries with deterministic pagination and freshness metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /reconciliation/handoffs/{handoffId}:
    get:
      tags: [Reconciliation]
      summary: Get reconciliation detail for a settlement handoff
      description: |
        Returns the settlement handoff, its trade-linked projection, execution event history, and
        freshness metadata for operator drift investigation workflows.
      operationId: getReconciliationHandoff
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - name: handoffId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reconciliation handoff detail payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationDetailResponse'
  /ricardian/{tradeId}:
    get:
      tags: [Ricardian]
      summary: Get Ricardian document retrieval payload for a trade
      description: |
        Read-through dashboard contract for Ricardian retrieval. The gateway resolves the trade,
        uses the authoritative Ricardian hash, retrieves the document from the Ricardian service,
        and returns verification-oriented metadata.
      operationId: getRicardianDocument
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/TradeId'
      responses:
        '200':
          description: Ricardian retrieval payload with freshness and verification metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RicardianDocumentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /evidence/{tradeId}:
    get:
      tags: [Evidence]
      summary: Get grouped evidence records for a trade
      description: |
        Returns the evidence sources needed by Cotsel-Dash Evidence and Trade Detail views. The
        payload groups trade settlement context, compliance decisions, and governance actions for a
        single trade.
      operationId: getTradeEvidence
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/TradeId'
      responses:
        '200':
          description: Grouped evidence payload for a trade.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeEvidenceResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /settlement/handoffs:
    post:
      tags: [Settlement]
      summary: Ingest a platform settlement handoff
      description: |
        Service-authenticated ingress contract for platform backends to register a settlement handoff with Cotsel.
        This route is not intended for operator sessions; it is authenticated using service-auth HMAC headers and
        requires an `Idempotency-Key` header.
      operationId: createSettlementHandoff
      security: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementHandoffCreateRequest'
      responses:
        '202':
          description: Settlement handoff accepted into the Cotsel orchestration boundary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementHandoffResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /settlement/handoffs/{handoffId}/execution-events:
    get:
      tags: [Settlement]
      summary: List settlement execution events for a handoff
      operationId: listSettlementExecutionEvents
      security: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/SettlementHandoffId'
      responses:
        '200':
          description: Settlement execution events for the handoff.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementExecutionEventListResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    post:
      tags: [Settlement]
      summary: Ingest execution or reconciliation truth for a settlement handoff
      description: |
        Service-authenticated mutation for authoritative execution and reconciliation truth coming back into the
        Cotsel gateway boundary. Every accepted event produces a durable callback-delivery record for the configured
        platform backend when callback delivery is enabled.
      operationId: createSettlementExecutionEvent
      security: []
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/SettlementHandoffId'
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettlementExecutionEventCreateRequest'
      responses:
        '202':
          description: Execution or reconciliation event accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettlementExecutionEventMutationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /governance/status:
    get:
      tags: [Governance]
      summary: Current protocol governance status
      operationId: getGovernanceStatus
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
      responses:
        '200':
          description: Snapshot of on-chain governance-relevant status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceStatusResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /evidence/bundles:
    post:
      tags: [Evidence]
      summary: Generate an evidence bundle manifest for a trade
      description: |
        Generates and persists a read-only evidence bundle manifest for Cotsel-Dash Evidence. The
        manifest exposes explicit artifact references and never claims a signed bundle unless the
        backend actually provides one.
      operationId: generateEvidenceBundle
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvidenceBundleGenerateRequest'
      responses:
        '201':
          description: Evidence bundle manifest generated and persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvidenceBundleResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
