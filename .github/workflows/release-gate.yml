name: CI Release Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      full_matrix: ${{ steps.mode.outputs.full_matrix }}
      shared: ${{ steps.filter.outputs.shared }}
      contracts: ${{ steps.filter.outputs.contracts }}
      sdk: ${{ steps.filter.outputs.sdk }}
      oracle: ${{ steps.filter.outputs.oracle }}
      indexer: ${{ steps.filter.outputs.indexer }}
      notifications: ${{ steps.filter.outputs.notifications }}
      reconciliation: ${{ steps.filter.outputs.reconciliation }}
      ricardian: ${{ steps.filter.outputs.ricardian }}
      treasury: ${{ steps.filter.outputs.treasury }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Resolve release gate mode
        id: mode
        shell: bash
        run: |
          full_matrix=false

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            full_matrix=true
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            labels='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if echo "$labels" | grep -q '"release-gate-full"'; then
              full_matrix=true
            fi
          fi

          echo "full_matrix=${full_matrix}" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        with:
          filters: |
            shared:
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
            contracts:
              - 'contracts/**'
            sdk:
              - 'sdk/**'
            oracle:
              - 'oracle/**'
            indexer:
              - 'indexer/**'
            notifications:
              - 'notifications/**'
            reconciliation:
              - 'reconciliation/**'
            ricardian:
              - 'ricardian/**'
            treasury:
              - 'treasury/**'

  docs-profile-guard:
    name: ci/docs-profile-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run docs/profile boundary guards
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/docs-profile-guard.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check docs-profile-name scripts/tests/docs-profile-name-guard.sh
          run_check api-gateway-boundary scripts/tests/api-gateway-boundary-guard.sh

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload docs/profile guard report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-docs-profile-guard
          path: ci-reports/docs-profile-guard.txt

  arch-roadmap-consistency:
    name: ci/arch-roadmap-consistency
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: '20'
          cache: npm

      - name: Run architecture-roadmap consistency guard
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          node scripts/architecture-roadmap-consistency-check.mjs \
            --repo "${{ github.repository }}" \
            --out "ci-reports/arch-roadmap-consistency.json" \
            > ci-reports/arch-roadmap-consistency.log 2>&1
          status=$?
          if [[ "$status" -ne 0 ]]; then
            node scripts/arch-roadmap-sync.mjs \
              --repo "${{ github.repository }}" \
              --out "ci-reports/arch-roadmap-sync.json" \
              --patch "ci-reports/arch-roadmap-sync.patch" \
              >> ci-reports/arch-roadmap-consistency.log 2>&1 || true
            {
              echo ""
              echo "Remediation:"
              echo "  GITHUB_TOKEN=\"\$(gh auth token)\" node scripts/arch-roadmap-sync.mjs --repo \"${{ github.repository }}\" --write"
              echo "  GITHUB_TOKEN=\"\$(gh auth token)\" node scripts/arch-roadmap-sync.mjs --repo \"${{ github.repository }}\" --write --normalize-progress"
              echo "  GITHUB_TOKEN=\"\$(gh auth token)\" node scripts/arch-roadmap-sync.mjs --repo \"${{ github.repository }}\" --write-gate-issues --apply"
            } >> ci-reports/arch-roadmap-consistency.log
          fi
          cat ci-reports/arch-roadmap-consistency.log
          exit "$status"

      - name: Upload architecture-roadmap consistency report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-arch-roadmap-consistency
          path: |
            ci-reports/arch-roadmap-consistency.json
            ci-reports/arch-roadmap-consistency.log
            ci-reports/arch-roadmap-sync.json
            ci-reports/arch-roadmap-sync.patch

  env-profile-regression:
    name: ci/env-profile-regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run env/profile regression scripts
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/env-profile-regression.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check docker-services-args scripts/tests/docker-services-args.test.sh
          run_check docker-services-health scripts/tests/docker-services-health.test.sh
          run_check docker-services-env-precedence scripts/tests/docker-services-env-precedence.test.sh
          run_check docker-services-env-layering scripts/tests/docker-services-env-layering.test.sh
          run_check staging-e2e-real-gate-start-block scripts/tests/staging-e2e-real-gate-start-block.test.sh
          run_check notifications-wiring-health scripts/tests/notifications-wiring-health.test.sh
          run_check arch-roadmap-consistency scripts/tests/architecture-roadmap-consistency-check.test.sh
          run_check arch-roadmap-sync scripts/tests/architecture-roadmap-sync.test.sh

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload env/profile regression report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-env-profile-regression
          path: ci-reports/env-profile-regression.txt

  postgres-recovery-smoke:
    name: ci/postgres-recovery-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Postgres backup/restore smoke
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports reports/postgres-recovery
          scripts/postgres-backup-restore-smoke.sh > ci-reports/postgres-recovery-smoke.log 2>&1
          status=$?
          cat ci-reports/postgres-recovery-smoke.log
          exit "$status"

      - name: Upload Postgres recovery smoke artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-postgres-recovery-smoke
          path: |
            ci-reports/postgres-recovery-smoke.log
            reports/postgres-recovery/backup-restore-smoke.log
            reports/postgres-recovery/backup-restore-smoke.json

  staging-e2e-real-gate:
    name: ci/staging-e2e-real-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build notifications workspace
        run: npm run -w notifications build

      - name: Prepare CI gate env files
        run: |
          cp .env.example .env
          cp .env.staging-e2e-real.example .env.staging-e2e-real
          cat <<'EOF' >> .env.staging-e2e-real
          STAGING_E2E_REAL_DYNAMIC_START_BLOCK=false
          STAGING_E2E_REAL_GATE_RPC_URL=
          EOF

      - name: Run staging gate path (CI-safe config mode)
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          raw_log="ci-reports/staging-e2e-real-gate.raw.txt"
          report="ci-reports/staging-e2e-real-gate.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" >> "$raw_log"
            if "$@" >> "$raw_log" 2>&1; then
              echo "[$label] PASS" >> "$raw_log"
            else
              echo "[$label] FAIL" >> "$raw_log"
              fail=1
            fi
            echo "" >> "$raw_log"
          }

          run_check validate-env scripts/validate-env.sh staging-e2e-real
          run_check staging-gate bash -lc "STAGING_E2E_REAL_GATE_ASSERT_CONFIG_ONLY=true scripts/staging-e2e-real-gate.sh"
          run_check notifications-gate scripts/notifications-gate.sh staging-e2e-real

          sed -E \
            -e 's/((API_KEY|HMAC_SECRET|PRIVATE_KEY|PASSWORD|SECRET|TOKEN|MNEMONIC)([[:space:]]*[:=][[:space:]]*))[^[:space:]"]+/\1***REDACTED***/gI' \
            -e 's/(authorization:[[:space:]]*Bearer[[:space:]]+)[^[:space:]]+/\1***REDACTED***/gI' \
            "$raw_log" > "$report"
          rm -f "$raw_log"

          cat "$report"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload staging gate report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-staging-e2e-real-gate
          path: ci-reports/staging-e2e-real-gate.txt

      - name: Upload notifications gate report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-notifications-gate
          path: reports/notifications/staging-e2e-real.json

      - name: Upload reconciliation report artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-reconciliation-report
          path: reports/reconciliation/staging-e2e-real-report.json
          if-no-files-found: error

  asset-fee-path:
    name: ci/asset-fee-path
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Prepare profile env files
        run: |
          cp .env.example .env
          cp .env.local.example .env.local
          cp .env.staging-e2e-real.example .env.staging-e2e-real

      - name: Run asset fee-path checks (config-only)
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/asset-fee-path.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
            if bash -lc "$cmd"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check local-dev "ASSET_FEE_PATH_ASSERT_CONFIG_ONLY=true bash scripts/asset-fee-path-gate.sh local-dev"
          run_check staging-e2e-real "ASSET_FEE_PATH_ASSERT_CONFIG_ONLY=true bash scripts/asset-fee-path-gate.sh staging-e2e-real"
          run_check regression-test "bash scripts/tests/asset-fee-path-gate.test.sh"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload asset fee-path report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-asset-fee-path
          path: |
            ci-reports/asset-fee-path.txt
            reports/asset-fee-path

  contracts:
    name: ci/contracts
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.contracts == 'true'
    env:
      WORKSPACE: contracts
      HARDHAT_VAR_PRIVATE_KEY: '0x0123456789012345678901234567890123456789012345678901234567890123'
      HARDHAT_VAR_PRIVATE_KEY2: '0x1111111111111111111111111111111111111111111111111111111111111111'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install pinned resolc binary (deterministic)
        shell: bash
        run: |
          set -euo pipefail

          RESOLC_VERSION="1.0.0"
          RESOLC_COMMIT="b080c1"

          case "$(uname -s)" in
            Linux)
              HH_PLATFORM="linux-amd64"
              RESOLC_NAME="resolc-x86_64-unknown-linux-musl"
              RESOLC_SHA256="e626ba7a1a0d26828c14713781b0082ececc9a0fbfe984f11f0d93d66bbd7806"
              ;;
            Darwin)
              HH_PLATFORM="macosx-amd64"
              RESOLC_NAME="resolc-universal-apple-darwin"
              RESOLC_SHA256="eaee8e64a863101e95e92e68b1e4e936081a97a68bc9dbf308a63f2d0084ce83"
              ;;
            *)
              echo "Unsupported OS for pinned resolc install: $(uname -s)"
              exit 1
              ;;
          esac

          RESOLC_FILE="${RESOLC_NAME}+commit.${RESOLC_COMMIT}"
          COMPILERS_DIR="$(node -e "require('hardhat/internal/util/global-dir').getCompilersDir().then((d) => process.stdout.write(d))")"
          PLATFORM_DIR="${COMPILERS_DIR}/${HH_PLATFORM}"
          TARGET_BIN="${PLATFORM_DIR}/${RESOLC_FILE}"

          mkdir -p "${PLATFORM_DIR}"
          curl -fsSL "https://github.com/paritytech/revive/releases/download/v${RESOLC_VERSION}/${RESOLC_NAME}" -o "${TARGET_BIN}"
          echo "${RESOLC_SHA256}  ${TARGET_BIN}" | shasum -a 256 -c -
          chmod +x "${TARGET_BIN}"

          cat > "${PLATFORM_DIR}/resolc-list.json" <<EOF
          {
            "builds": [
              {
                "name": "${RESOLC_NAME}",
                "path": "${RESOLC_FILE}",
                "version": "${RESOLC_VERSION}",
                "build": "${RESOLC_COMMIT}",
                "longVersion": "${RESOLC_VERSION}+commit.${RESOLC_COMMIT}.llvm-18.1.8",
                "sha256": "${RESOLC_SHA256}",
                "platform": "${HH_PLATFORM}"
              }
            ],
            "releases": {
              "v${RESOLC_VERSION}": "${RESOLC_FILE}"
            },
            "latestRelease": "v${RESOLC_VERSION}"
          }
          EOF

          "${TARGET_BIN}" --version

      - name: Compile contracts via PolkaVM resolc path
        run: npm run -w contracts compile:polkavm

      - name: Generate PolkaVM compile evidence bundle
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p reports/polkavm-compile

          files_file="reports/polkavm-compile/artifact-files.txt"
          hashes_file="reports/polkavm-compile/artifact-hashes.txt"
          bundle_file="reports/polkavm-compile/compile-evidence.json"

          find contracts/artifacts -type f | LC_ALL=C sort > "$files_file"

          if [[ -s "$files_file" ]]; then
            while IFS= read -r file; do
              shasum -a 256 "$file"
            done < "$files_file" > "$hashes_file"
          else
            : > "$hashes_file"
          fi

          artifact_set_hash=$(shasum -a 256 "$hashes_file" | awk '{print $1}')
          commit_sha=$(git rev-parse HEAD)
          resolc_version=$(node -p "const fs=require('fs');const path=require('path');const entry=require.resolve('@parity/resolc');const pkg=JSON.parse(fs.readFileSync(path.join(path.dirname(entry),'..','package.json'),'utf8'));pkg.version" 2>/dev/null || echo "unknown")

          solc_version=$(node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const dir = path.join(process.cwd(), 'contracts', 'artifacts', 'build-info');
          try {
            const files = fs.readdirSync(dir).filter((f) => f.endsWith('.json')).sort();
            if (files.length === 0) {
              process.stdout.write('unknown');
              process.exit(0);
            }
            const buildInfo = JSON.parse(fs.readFileSync(path.join(dir, files[0]), 'utf8'));
            process.stdout.write(buildInfo.solcVersion || 'unknown');
          } catch {
            process.stdout.write('unknown');
          }
          NODE
          )

          solc_long_version=$(node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const dir = path.join(process.cwd(), 'contracts', 'artifacts', 'build-info');
          try {
            const files = fs.readdirSync(dir).filter((f) => f.endsWith('.json')).sort();
            if (files.length === 0) {
              process.stdout.write('unknown');
              process.exit(0);
            }
            const buildInfo = JSON.parse(fs.readFileSync(path.join(dir, files[0]), 'utf8'));
            process.stdout.write(buildInfo.solcLongVersion || 'unknown');
          } catch {
            process.stdout.write('unknown');
          }
          NODE
          )

          pvm_artifact_count=$(node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const root = path.join(process.cwd(), 'contracts', 'artifacts');
          let count = 0;
          function walk(dir) {
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                walk(full);
                continue;
              }
              if (!entry.name.endsWith('.json') || entry.name.endsWith('.dbg.json')) {
                continue;
              }
              try {
                const parsed = JSON.parse(fs.readFileSync(full, 'utf8'));
                if (parsed && parsed._format === 'hh-resolc-artifact-1') {
                  count += 1;
                }
              } catch {}
            }
          }
          try {
            walk(root);
            process.stdout.write(String(count));
          } catch {
            process.stdout.write('0');
          }
          NODE
          )

          cat > "$bundle_file" <<EOF
          {
            "generatedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commitSha": "${commit_sha}",
            "resolcVersion": "${resolc_version}",
            "solcVersion": "${solc_version}",
            "solcLongVersion": "${solc_long_version}",
            "artifactFileCount": $(wc -l < "$files_file" | tr -d ' '),
            "pvmArtifactCount": ${pvm_artifact_count},
            "artifactHashesFile": "${hashes_file}",
            "artifactSetHashSha256": "${artifact_set_hash}"
          }
          EOF

      - name: Guard PolkaVM artifact evidence integrity
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          bundle_file="reports/polkavm-compile/compile-evidence.json"
          if [[ ! -f "$bundle_file" ]]; then
            echo "Missing compile evidence bundle: $bundle_file"
            exit 1
          fi

          pvm_count="$(jq -r '.pvmArtifactCount // empty' "$bundle_file")"
          if [[ -z "$pvm_count" || "$pvm_count" == "0" || "$pvm_count" == "null" ]]; then
            echo "pvmArtifactCount=$pvm_count (expected >0). resolc artifacts missing/overwritten."
            exit 1
          fi
          echo "pvmArtifactCount=$pvm_count"

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/${WORKSPACE}.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
            if bash -lc "$cmd"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check lint "npm run -w ${WORKSPACE} lint --if-present"
          run_check typecheck "npm run -w ${WORKSPACE} typecheck --if-present"
          run_check test "npm run -w ${WORKSPACE} test --if-present"
          run_check build "npm run -w ${WORKSPACE} build --if-present"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload PolkaVM compile evidence bundle
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-contracts-compile-polkavm
          path: reports/polkavm-compile

      - name: Upload workspace report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-${{ env.WORKSPACE }}
          path: ci-reports/${{ env.WORKSPACE }}.txt

  contracts_deploy_verification:
    name: ci/contracts-deploy-verification
    runs-on: ubuntu-latest
    needs:
      - changes
      - contracts
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.contracts == 'true'
    env:
      DEPLOY_VERIFY_RPC_URL: "https://services.polkadothub-rpc.com/testnet"
      DEPLOY_VERIFY_NETWORK_NAME: "polkadotTestnet"
      DEPLOY_VERIFY_RUNTIME_TARGET: "paseo-asset-hub-revive"
      DEPLOY_VERIFY_EXPECTED_CHAIN_ID: "0x190f1b41"
      DEPLOY_VERIFY_ARTIFACT_PATH: "contracts/artifacts/src/MockUSDC.sol/MockUSDC.json"
      DEPLOY_VERIFY_CONTRACT_ADDRESS: "0xd58fA437C8Ad344a85D6CA99E91700a1E160d87b"
      DEPLOY_VERIFY_TX_HASH: "0x6ea53035e3f594a40913a56c4257045a9101dbb7309b6721ab81d17d1cef574f"
      DEPLOY_VERIFY_COMPILER_NAME: "solc"
      DEPLOY_VERIFY_OUT_DIR: "reports/deploy-verification"
      DEPLOY_VERIFY_TIMEOUT_MS: '12000'
      DEPLOY_VERIFY_RETRIES: '3'
      DEPLOY_VERIFY_BACKOFF_MS: '1000'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install pinned resolc binary (deterministic)
        shell: bash
        run: |
          set -euo pipefail

          RESOLC_VERSION="1.0.0"
          RESOLC_COMMIT="b080c1"

          case "$(uname -s)" in
            Linux)
              HH_PLATFORM="linux-amd64"
              RESOLC_NAME="resolc-x86_64-unknown-linux-musl"
              RESOLC_SHA256="e626ba7a1a0d26828c14713781b0082ececc9a0fbfe984f11f0d93d66bbd7806"
              ;;
            Darwin)
              HH_PLATFORM="macosx-amd64"
              RESOLC_NAME="resolc-universal-apple-darwin"
              RESOLC_SHA256="eaee8e64a863101e95e92e68b1e4e936081a97a68bc9dbf308a63f2d0084ce83"
              ;;
            *)
              echo "Unsupported OS for pinned resolc install: $(uname -s)"
              exit 1
              ;;
          esac

          RESOLC_FILE="${RESOLC_NAME}+commit.${RESOLC_COMMIT}"
          COMPILERS_DIR="$(node -e "require('hardhat/internal/util/global-dir').getCompilersDir().then((d) => process.stdout.write(d))")"
          PLATFORM_DIR="${COMPILERS_DIR}/${HH_PLATFORM}"
          TARGET_BIN="${PLATFORM_DIR}/${RESOLC_FILE}"

          mkdir -p "${PLATFORM_DIR}"
          curl -fsSL "https://github.com/paritytech/revive/releases/download/v${RESOLC_VERSION}/${RESOLC_NAME}" -o "${TARGET_BIN}"
          echo "${RESOLC_SHA256}  ${TARGET_BIN}" | shasum -a 256 -c -
          chmod +x "${TARGET_BIN}"

          cat > "${PLATFORM_DIR}/resolc-list.json" <<EOF
          {
            "builds": [
              {
                "name": "${RESOLC_NAME}",
                "path": "${RESOLC_FILE}",
                "version": "${RESOLC_VERSION}",
                "build": "${RESOLC_COMMIT}",
                "longVersion": "${RESOLC_VERSION}+commit.${RESOLC_COMMIT}.llvm-18.1.8",
                "sha256": "${RESOLC_SHA256}",
                "platform": "${HH_PLATFORM}"
              }
            ],
            "releases": {
              "v${RESOLC_VERSION}": "${RESOLC_FILE}"
            },
            "latestRelease": "v${RESOLC_VERSION}"
          }
          EOF

          "${TARGET_BIN}" --version

      - name: Generate contract artifacts for verification
        run: npm run -w contracts compile:polkavm

      - name: Verify deployed contract bytecode and deployment evidence
        run: node scripts/polkavm-deploy-verify.mjs

      - name: Upload deploy verification artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ci-report-contracts-deploy-verification
          path: reports/deploy-verification

