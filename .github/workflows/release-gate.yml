name: CI Release Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      full_matrix: ${{ steps.mode.outputs.full_matrix }}
      shared: ${{ steps.filter.outputs.shared }}
      contracts: ${{ steps.filter.outputs.contracts }}
      sdk: ${{ steps.filter.outputs.sdk }}
      oracle: ${{ steps.filter.outputs.oracle }}
      indexer: ${{ steps.filter.outputs.indexer }}
      notifications: ${{ steps.filter.outputs.notifications }}
      reconciliation: ${{ steps.filter.outputs.reconciliation }}
      ricardian: ${{ steps.filter.outputs.ricardian }}
      treasury: ${{ steps.filter.outputs.treasury }}
      gateway: ${{ steps.filter.outputs.gateway }}
      auth: ${{ steps.filter.outputs.auth }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Resolve release gate mode
        id: mode
        shell: bash
        run: |
          full_matrix=false

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            full_matrix=true
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            labels='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if echo "$labels" | grep -q '"release-gate-full"'; then
              full_matrix=true
            fi
          fi

          echo "full_matrix=${full_matrix}" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706
        with:
          filters: |
            shared:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'eslint.config.mjs'
              - '.prettierrc.json'
              - '.prettierignore'
              - '.husky/**'
              - '.github/workflows/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'SECURITY.md'
              - 'THIRD_PARTY_NOTICES.md'
              - 'docs/**'
              - 'scripts/**'
            contracts:
              - 'contracts/**'
            sdk:
              - 'sdk/**'
            oracle:
              - 'oracle/**'
            indexer:
              - 'indexer/**'
            notifications:
              - 'notifications/**'
            reconciliation:
              - 'reconciliation/**'
            ricardian:
              - 'ricardian/**'
            treasury:
              - 'treasury/**'
            gateway:
              - 'gateway/**'
              - 'docs/api/cotsel-dashboard-gateway.openapi.yml'
              - 'docs/runbooks/dashboard-api-gateway-boundary.md'
              - 'docs/runbooks/dashboard-gateway-operations.md'
            auth:
              - 'auth/**'
              - 'shared-auth/**'
              - 'shared-edge/**'
              - 'docs/runbooks/auth-admin-provisioning.md'
              - 'docs/runbooks/auth-break-glass.md'

  dependency-security:
    name: ci/dependency-security
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run dependency security gate
        run: pnpm run security:deps:gate

  auth:
    name: ci/auth
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.auth == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run auth validation suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p ci-reports
          report="ci-reports/auth-validation.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check auth-lint pnpm --filter ./auth run lint
          run_check auth-tests pnpm --filter ./auth run test
          run_check auth-build pnpm --filter ./auth run build

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload auth validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-auth-validation
          path: ci-reports/auth-validation.txt

  repo-quality:
    name: ci/repo-quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repo-quality baseline
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p ci-reports
          report="ci-reports/repo-quality.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check repo-lint pnpm run lint
          run_check repo-format-check pnpm run format:check:full
          run_check repo-typecheck pnpm run typecheck

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload repo-quality report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-repo-quality
          path: ci-reports/repo-quality.txt

  gateway:
    name: ci/gateway
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.gateway == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run gateway validation suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p ci-reports
          report="ci-reports/gateway-validation.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check gateway-lint pnpm --filter ./gateway run lint
          run_check gateway-openapi-and-unit-tests pnpm --filter ./gateway run test
          run_check gateway-build pnpm --filter ./gateway run build

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload gateway validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-gateway-validation
          path: ci-reports/gateway-validation.txt

  docs-profile-guard:
    name: ci/docs-profile-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'

      - name: Run docs/profile boundary guards
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p ci-reports
          report="ci-reports/docs-profile-guard.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check docs-profile-name scripts/tests/docs-profile-name-guard.sh
          run_check pnpm-workspace-command-guard bash scripts/tests/pnpm-workspace-command-guard.sh
          run_check api-gateway-boundary scripts/tests/api-gateway-boundary-guard.sh
          run_check dashboard-gateway-route-inventory node scripts/tests/dashboard-gateway-route-inventory-guard.mjs
          run_check programmability-governance scripts/tests/programmability-governance-guard.sh
          run_check base-mainnet-governance scripts/tests/base-mainnet-governance-guard.sh
          run_check data-classification-guard node scripts/tests/data-classification-guard.mjs
          run_check monitoring-baseline-validator node scripts/monitoring-baseline-validate.mjs --runbook docs/runbooks/monitoring-alerting-baseline.md --out ci-reports/monitoring-baseline-validation.json

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload docs/profile guard report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-docs-profile-guard
          path: |
            ci-reports/docs-profile-guard.txt
            ci-reports/monitoring-baseline-validation.json

      - name: Upload monitoring baseline validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-monitoring-baseline
          path: ci-reports/monitoring-baseline-validation.json

  env-profile-regression:
    name: ci/env-profile-regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run env/profile regression scripts
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/env-profile-regression.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check cotsel-args scripts/tests/cotsel-args.test.sh
          run_check cotsel-health scripts/tests/cotsel-health.test.sh
          run_check cotsel-env-preflight scripts/tests/cotsel-env-preflight.test.sh
          run_check cotsel-runtime-env scripts/tests/cotsel-runtime-env.test.sh
          run_check cotsel-runtime-conflict-guard scripts/tests/cotsel-runtime-conflict-guard.test.sh
          run_check runtime-gate-start-block scripts/tests/runtime-gate-start-block.test.sh
          run_check notifications-wiring-health scripts/tests/notifications-wiring-health.test.sh
          run_check validate-env-rate-limit-redis scripts/tests/validate-env-rate-limit-redis.test.sh
          run_check validate-env-gateway-db-name scripts/tests/validate-env-gateway-db-name.test.sh
          run_check validate-env-runtime-placeholders scripts/tests/validate-env-runtime-placeholders.test.sh
          run_check validate-env-runtime-service-auth scripts/tests/validate-env-runtime-service-auth.test.sh
          run_check compose-rate-limit-wiring scripts/tests/compose-rate-limit-wiring.test.sh

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload env/profile regression report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-env-profile-regression
          path: ci-reports/env-profile-regression.txt

  postgres-recovery-smoke:
    name: ci/postgres-recovery-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Run Postgres backup/restore smoke
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports reports/postgres-recovery
          scripts/postgres-backup-restore-smoke.sh > ci-reports/postgres-recovery-smoke.log 2>&1
          status=$?
          cat ci-reports/postgres-recovery-smoke.log
          exit "$status"

      - name: Upload Postgres recovery smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-postgres-recovery-smoke
          path: |
            ci-reports/postgres-recovery-smoke.log
            reports/postgres-recovery/backup-restore-smoke.log
            reports/postgres-recovery/backup-restore-smoke.json

  runtime-gate:
    name: ci/runtime-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build notifications workspace
        run: pnpm --filter ./notifications run build

      - name: Prepare CI gate env file
        run: |
          cp scripts/tests/fixtures/runtime.env .env.runtime
          cat <<'EOF' >> .env.runtime
          STAGING_E2E_REAL_DYNAMIC_START_BLOCK=false
          STAGING_E2E_REAL_GATE_RPC_URL=
          EOF

      - name: Run staging gate path (CI-safe config mode)
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          raw_log="ci-reports/runtime-gate.raw.txt"
          report="ci-reports/runtime-gate.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" >> "$raw_log"
            if "$@" >> "$raw_log" 2>&1; then
              echo "[$label] PASS" >> "$raw_log"
            else
              echo "[$label] FAIL" >> "$raw_log"
              fail=1
            fi
            echo "" >> "$raw_log"
          }

          run_check validate-env scripts/validate-env.sh runtime
          run_check runtime-gate bash -lc "STAGING_E2E_REAL_GATE_ASSERT_CONFIG_ONLY=true scripts/runtime-gate.sh"
          run_check notifications-gate scripts/notifications-gate.sh runtime

          sed -E \
            -e 's/((API_KEY|HMAC_SECRET|PRIVATE_KEY|PASSWORD|SECRET|TOKEN|MNEMONIC)([[:space:]]*[:=][[:space:]]*))[^[:space:]"]+/\1***REDACTED***/gI' \
            -e 's/(authorization:[[:space:]]*Bearer[[:space:]]+)[^[:space:]]+/\1***REDACTED***/gI' \
            "$raw_log" > "$report"
          rm -f "$raw_log"

          cat "$report"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload staging gate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-runtime-gate
          path: ci-reports/runtime-gate.txt

      - name: Upload notifications gate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-notifications-gate
          path: reports/notifications/runtime.json

      - name: Upload reconciliation report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-reconciliation-report
          path: reports/reconciliation/runtime-report.json
          if-no-files-found: error

  contracts:
    name: ci/contracts
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.contracts == 'true'
    env:
      WORKSPACE: contracts
      HARDHAT_VAR_PRIVATE_KEY: '0x0123456789012345678901234567890123456789012345678901234567890123'
      HARDHAT_VAR_PRIVATE_KEY2: '0x1111111111111111111111111111111111111111111111111111111111111111'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/${WORKSPACE}.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
            if bash -lc "$cmd"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check lint "pnpm --filter ./${WORKSPACE} run --if-present lint"
          run_check typecheck "pnpm --filter ./${WORKSPACE} run --if-present typecheck"
          run_check test "pnpm --filter ./${WORKSPACE} run --if-present test"
          run_check build "pnpm --filter ./${WORKSPACE} run --if-present build"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload workspace report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-${{ env.WORKSPACE }}
          path: ci-reports/${{ env.WORKSPACE }}.txt

  sdk:
    name: ci/sdk
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.sdk == 'true'
    env:
      WORKSPACE: sdk
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/${WORKSPACE}.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
            if bash -lc "$cmd"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check lint "pnpm --filter ./${WORKSPACE} run --if-present lint"
          run_check typecheck "pnpm --filter ./${WORKSPACE} run --if-present typecheck"
          run_check test "pnpm --filter ./${WORKSPACE} run --if-present test"
          run_check build "pnpm --filter ./${WORKSPACE} run --if-present build"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload workspace report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-${{ env.WORKSPACE }}
          path: ci-reports/${{ env.WORKSPACE }}.txt

  oracle:
    name: ci/oracle
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.oracle == 'true' || needs.changes.outputs.sdk == 'true' || needs.changes.outputs.notifications == 'true'
    env:
      WORKSPACE: oracle
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared runtime dependencies
        run: |
          pnpm --filter ./sdk run build
          pnpm --filter ./notifications run build

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/${WORKSPACE}.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
            if bash -lc "$cmd"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check lint "pnpm --filter ./${WORKSPACE} run --if-present lint"
          run_check typecheck "pnpm --filter ./${WORKSPACE} run --if-present typecheck"
          run_check test "pnpm --filter ./${WORKSPACE} run --if-present test"
          run_check build "pnpm --filter ./${WORKSPACE} run --if-present build"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload workspace report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-${{ env.WORKSPACE }}
          path: ci-reports/${{ env.WORKSPACE }}.txt

  indexer:
    name: ci/indexer
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.indexer == 'true'
    env:
      WORKSPACE: indexer
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/${WORKSPACE}.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
