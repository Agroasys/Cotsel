name: CI Release Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      full_matrix: ${{ steps.mode.outputs.full_matrix }}
      shared: ${{ steps.filter.outputs.shared }}
      contracts: ${{ steps.filter.outputs.contracts }}
      sdk: ${{ steps.filter.outputs.sdk }}
      oracle: ${{ steps.filter.outputs.oracle }}
      indexer: ${{ steps.filter.outputs.indexer }}
      notifications: ${{ steps.filter.outputs.notifications }}
      reconciliation: ${{ steps.filter.outputs.reconciliation }}
      ricardian: ${{ steps.filter.outputs.ricardian }}
      treasury: ${{ steps.filter.outputs.treasury }}
      gateway: ${{ steps.filter.outputs.gateway }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Resolve release gate mode
        id: mode
        shell: bash
        run: |
          full_matrix=false

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == "refs/heads/main" ]]; then
            full_matrix=true
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            labels='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if echo "$labels" | grep -q '"release-gate-full"'; then
              full_matrix=true
            fi
          fi

          echo "full_matrix=${full_matrix}" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        with:
          filters: |
            shared:
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.mjs'
              - '.prettierrc.json'
              - '.prettierignore'
              - '.husky/**'
              - '.github/workflows/**'
              - 'README.md'
              - 'CONTRIBUTING.md'
              - 'SECURITY.md'
              - 'THIRD_PARTY_NOTICES.md'
              - 'docs/**'
              - 'scripts/**'
            contracts:
              - 'contracts/**'
            sdk:
              - 'sdk/**'
            oracle:
              - 'oracle/**'
            indexer:
              - 'indexer/**'
            notifications:
              - 'notifications/**'
            reconciliation:
              - 'reconciliation/**'
            ricardian:
              - 'ricardian/**'
            treasury:
              - 'treasury/**'
            gateway:
              - 'gateway/**'
              - 'docs/api/cotsel-dashboard-gateway.openapi.yml'
              - 'docs/runbooks/dashboard-api-gateway-boundary.md'
              - 'docs/runbooks/dashboard-gateway-operations.md'

  repo-quality:
    name: ci/repo-quality
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repo-quality baseline
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p ci-reports
          report="ci-reports/repo-quality.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check repo-lint npm run lint
          run_check repo-format-check npm run format:check:full
          run_check repo-typecheck npm run typecheck

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload repo-quality report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-repo-quality
          path: ci-reports/repo-quality.txt

  gateway:
    name: ci/gateway
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.gateway == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run gateway validation suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p ci-reports
          report="ci-reports/gateway-validation.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check gateway-lint npm run -w gateway lint
          run_check gateway-openapi-and-unit-tests npm run -w gateway test
          run_check gateway-build npm run -w gateway build

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload gateway validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-gateway-validation
          path: ci-reports/gateway-validation.txt

  docs-profile-guard:
    name: ci/docs-profile-guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm

      - name: Run docs/profile boundary guards
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p ci-reports
          report="ci-reports/docs-profile-guard.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check docs-profile-name scripts/tests/docs-profile-name-guard.sh
          run_check api-gateway-boundary scripts/tests/api-gateway-boundary-guard.sh
          run_check programmability-governance scripts/tests/programmability-governance-guard.sh
          run_check base-mainnet-governance scripts/tests/base-mainnet-governance-guard.sh
          run_check data-classification-guard node scripts/tests/data-classification-guard.mjs
          run_check monitoring-baseline-validator node scripts/monitoring-baseline-validate.mjs --runbook docs/runbooks/monitoring-alerting-baseline.md --out ci-reports/monitoring-baseline-validation.json

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload docs/profile guard report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-docs-profile-guard
          path: |
            ci-reports/docs-profile-guard.txt
            ci-reports/monitoring-baseline-validation.json

      - name: Upload monitoring baseline validation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-monitoring-baseline
          path: ci-reports/monitoring-baseline-validation.json

  env-profile-regression:
    name: ci/env-profile-regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run env/profile regression scripts
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/env-profile-regression.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" | tee -a "$report"
            if "$@" 2>&1 | tee -a "$report"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check docker-services-args scripts/tests/docker-services-args.test.sh
          run_check docker-services-health scripts/tests/docker-services-health.test.sh
          run_check docker-services-env-precedence scripts/tests/docker-services-env-precedence.test.sh
          run_check docker-services-env-layering scripts/tests/docker-services-env-layering.test.sh
          run_check staging-e2e-real-gate-start-block scripts/tests/staging-e2e-real-gate-start-block.test.sh
          run_check notifications-wiring-health scripts/tests/notifications-wiring-health.test.sh

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload env/profile regression report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-env-profile-regression
          path: ci-reports/env-profile-regression.txt

  postgres-recovery-smoke:
    name: ci/postgres-recovery-smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Postgres backup/restore smoke
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports reports/postgres-recovery
          scripts/postgres-backup-restore-smoke.sh > ci-reports/postgres-recovery-smoke.log 2>&1
          status=$?
          cat ci-reports/postgres-recovery-smoke.log
          exit "$status"

      - name: Upload Postgres recovery smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-postgres-recovery-smoke
          path: |
            ci-reports/postgres-recovery-smoke.log
            reports/postgres-recovery/backup-restore-smoke.log
            reports/postgres-recovery/backup-restore-smoke.json

  staging-e2e-real-gate:
    name: ci/staging-e2e-real-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build notifications workspace
        run: npm run -w notifications build

      - name: Prepare CI gate env files
        run: |
          cp .env.example .env
          cp .env.staging-e2e-real.example .env.staging-e2e-real
          cat <<'EOF' >> .env.staging-e2e-real
          STAGING_E2E_REAL_DYNAMIC_START_BLOCK=false
          STAGING_E2E_REAL_GATE_RPC_URL=
          EOF

      - name: Run staging gate path (CI-safe config mode)
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          raw_log="ci-reports/staging-e2e-real-gate.raw.txt"
          report="ci-reports/staging-e2e-real-gate.txt"
          fail=0

          run_check() {
            local label="$1"
            shift
            echo "[$label] command: $*" >> "$raw_log"
            if "$@" >> "$raw_log" 2>&1; then
              echo "[$label] PASS" >> "$raw_log"
            else
              echo "[$label] FAIL" >> "$raw_log"
              fail=1
            fi
            echo "" >> "$raw_log"
          }

          run_check validate-env scripts/validate-env.sh staging-e2e-real
          run_check staging-gate bash -lc "STAGING_E2E_REAL_GATE_ASSERT_CONFIG_ONLY=true scripts/staging-e2e-real-gate.sh"
          run_check notifications-gate scripts/notifications-gate.sh staging-e2e-real

          sed -E \
            -e 's/((API_KEY|HMAC_SECRET|PRIVATE_KEY|PASSWORD|SECRET|TOKEN|MNEMONIC)([[:space:]]*[:=][[:space:]]*))[^[:space:]"]+/\1***REDACTED***/gI' \
            -e 's/(authorization:[[:space:]]*Bearer[[:space:]]+)[^[:space:]]+/\1***REDACTED***/gI' \
            "$raw_log" > "$report"
          rm -f "$raw_log"

          cat "$report"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload staging gate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-staging-e2e-real-gate
          path: ci-reports/staging-e2e-real-gate.txt

      - name: Upload notifications gate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-notifications-gate
          path: reports/notifications/staging-e2e-real.json

      - name: Upload reconciliation report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-reconciliation-report
          path: reports/reconciliation/staging-e2e-real-report.json
          if-no-files-found: error

  contracts:
    name: ci/contracts
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.contracts == 'true'
    env:
      WORKSPACE: contracts
      HARDHAT_VAR_PRIVATE_KEY: '0x0123456789012345678901234567890123456789012345678901234567890123'
      HARDHAT_VAR_PRIVATE_KEY2: '0x1111111111111111111111111111111111111111111111111111111111111111'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/${WORKSPACE}.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
            if bash -lc "$cmd"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check lint "npm run -w ${WORKSPACE} lint --if-present"
          run_check typecheck "npm run -w ${WORKSPACE} typecheck --if-present"
          run_check test "npm run -w ${WORKSPACE} test --if-present"
          run_check build "npm run -w ${WORKSPACE} build --if-present"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload workspace report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-${{ env.WORKSPACE }}
          path: ci-reports/${{ env.WORKSPACE }}.txt

  sdk:
    name: ci/sdk
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.sdk == 'true'
    env:
      WORKSPACE: sdk
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/${WORKSPACE}.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
            if bash -lc "$cmd"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check lint "npm run -w ${WORKSPACE} lint --if-present"
          run_check typecheck "npm run -w ${WORKSPACE} typecheck --if-present"
          run_check test "npm run -w ${WORKSPACE} test --if-present"
          run_check build "npm run -w ${WORKSPACE} build --if-present"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload workspace report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-${{ env.WORKSPACE }}
          path: ci-reports/${{ env.WORKSPACE }}.txt

  oracle:
    name: ci/oracle
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.oracle == 'true' || needs.changes.outputs.sdk == 'true' || needs.changes.outputs.notifications == 'true'
    env:
      WORKSPACE: oracle
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared runtime dependencies
        run: |
          npm run -w sdk build
          npm run -w notifications build

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/${WORKSPACE}.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
            if bash -lc "$cmd"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check lint "npm run -w ${WORKSPACE} lint --if-present"
          run_check typecheck "npm run -w ${WORKSPACE} typecheck --if-present"
          run_check test "npm run -w ${WORKSPACE} test --if-present"
          run_check build "npm run -w ${WORKSPACE} build --if-present"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload workspace report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-${{ env.WORKSPACE }}
          path: ci-reports/${{ env.WORKSPACE }}.txt

  indexer:
    name: ci/indexer
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.indexer == 'true'
    env:
      WORKSPACE: indexer
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/${WORKSPACE}.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
            if bash -lc "$cmd"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check lint "npm run -w ${WORKSPACE} lint --if-present"
          run_check typecheck "npm run -w ${WORKSPACE} typecheck --if-present"
          run_check test "npm run -w ${WORKSPACE} test --if-present"
          run_check build "npm run -w ${WORKSPACE} build --if-present"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload workspace report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-${{ env.WORKSPACE }}
          path: ci-reports/${{ env.WORKSPACE }}.txt

  notifications:
    name: ci/notifications
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.notifications == 'true'
    env:
      WORKSPACE: notifications
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          report="ci-reports/${WORKSPACE}.txt"
          fail=0

          run_check() {
            local label="$1"
            local cmd="$2"
            echo "[$label] command: $cmd" | tee -a "$report"
            if bash -lc "$cmd"; then
              echo "[$label] PASS" | tee -a "$report"
            else
              echo "[$label] FAIL" | tee -a "$report"
              fail=1
            fi
            echo "" >> "$report"
          }

          run_check lint "npm run -w ${WORKSPACE} lint --if-present"
          run_check typecheck "npm run -w ${WORKSPACE} typecheck --if-present"
          run_check test "npm run -w ${WORKSPACE} test --if-present"
          run_check build "npm run -w ${WORKSPACE} build --if-present"

          if [[ "$fail" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload workspace report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ci-report-${{ env.WORKSPACE }}
          path: ci-reports/${{ env.WORKSPACE }}.txt

  reconciliation:
    name: ci/reconciliation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.full_matrix == 'true' || needs.changes.outputs.shared == 'true' || needs.changes.outputs.reconciliation == 'true' || needs.changes.outputs.sdk == 'true' || needs.changes.outputs.notifications == 'true'
    env:
      WORKSPACE: reconciliation
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared runtime dependencies
        run: |
          npm run -w sdk build
          npm run -w notifications build

      - name: Run workspace checks
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
